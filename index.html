<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Luxviai — Light your way!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --lux: #ED9107;
  --lux-soft: #F5D68A;
  --bg: #000;
  --fg: #E8E5DF;
  --muted: #9AA3A6;
  --platinum: #A7A9AC;
  --rail-top: 72px;
  --rail-bottom: 18px;
}
body {
  background: var(--bg);
  font-family: "Inter", sans-serif;
  color: var(--fg);
  height: 100vh;
  overflow: hidden;
}
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-track { background: #000; }
*::-webkit-scrollbar-thumb { background: #7A7D81; border-radius: 8px; }
* { scrollbar-color: #7A7D81 #000; scrollbar-width: thin; }

.app {
  width: 100%;
  max-width: 1280px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
}
.header {
  text-align: center;
  padding: 26px 20px 18px;
  border-bottom: 1px solid rgba(237,145,7,0.2);
  background: #000;
  z-index: 10;
  position: relative;
}
.logo {
  font-family: "Plus Jakarta Sans", sans-serif;
  font-size: 2.7rem;
  font-weight: 300;
  letter-spacing: 5px;
  color: var(--lux);
}
.tagline {
  margin-top: 8px;
  font-size: 0.9rem;
  letter-spacing: 2px;
  color: var(--muted);
  opacity: 0.7;
}
.header-tools {
  position: absolute;
  right: 18px;
  top: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 4px;
}
.header-tools::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -2px;
  height: 1px;
  background: rgba(237,145,7,0.28);
  pointer-events: none;
}
.search-capsule {
  height: 36px;
  border: 1px solid rgba(237,145,7,0.34);
  border-radius: 999px;
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.85);
  width: 0;
  overflow: hidden;
  opacity: 0;
  transition: width .25s ease, opacity .2s ease;
}
.search-capsule.open {
  width: min(54vw, 320px);
  opacity: 1;
}
.search-capsule input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--fg);
  padding: 0 10px 0 12px;
  font-size: .8rem;
  outline: none;
}
.search-capsule button {
  border: none;
  background: transparent;
  color: var(--lux);
  width: 34px;
  height: 34px;
  cursor: pointer;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(237,145,7,0.4);
  background: rgba(0,0,0,0.75);
  color: var(--lux);
  cursor: pointer;
}
.menu-btn {
  width: 42px;
  height: 42px;
  background: none;
  border: none;
  color: #C9974D;
  font-size: 26px;
  cursor: pointer;
}

.glyph-strip {
  width: 100%;
  height: 132px;
  background: #000;
  position: relative;
  overflow: hidden;
}
#glyphCanvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  display: block;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px;
  margin-right: 0;
  padding-right: 6px;
  padding-bottom: 180px;
  position: relative;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.chat-box::-webkit-scrollbar { display: none; }
body.luxdream-mode .chat-box::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 6% 22%, rgba(237,145,7,.42) 0 1px, transparent 1.4px),
    radial-gradient(circle at 14% 70%, rgba(245,214,138,.36) 0 1px, transparent 1.4px),
    radial-gradient(circle at 25% 42%, rgba(237,145,7,.30) 0 1px, transparent 1.4px),
    radial-gradient(circle at 37% 18%, rgba(245,214,138,.34) 0 1px, transparent 1.4px),
    radial-gradient(circle at 49% 63%, rgba(237,145,7,.30) 0 1px, transparent 1.4px),
    radial-gradient(circle at 63% 35%, rgba(245,214,138,.38) 0 1px, transparent 1.4px),
    radial-gradient(circle at 78% 74%, rgba(237,145,7,.34) 0 1px, transparent 1.4px),
    radial-gradient(circle at 89% 24%, rgba(245,214,138,.36) 0 1px, transparent 1.4px),
    radial-gradient(circle at 96% 56%, rgba(237,145,7,.28) 0 1px, transparent 1.4px);
  image-rendering: pixelated;
  animation: dreamSparkle 6s steps(4, end) infinite;
}
body.luxdream-mode .chat-box::before {
  display: none;
}
@keyframes dreamSparkle {
  0% { opacity: .16; }
  25% { opacity: .28; }
  50% { opacity: .20; }
  75% { opacity: .32; }
  100% { opacity: .16; }
}
.msg {
  max-width: fit-content;
  margin-bottom: 16px;
  line-height: 1.5;
  font-size: 0.95rem;
  word-break: break-word;
  position: relative;
}
.msg.user {
  margin-left: auto;
  background: #111;
  border: 1px solid rgba(237,145,7,0.2);
  padding: 10px 16px;
  border-radius: 22px;
}
.msg.ai {
  margin-right: auto;
  padding: 4px 0;
}
.msg.ai::before {
  content: "-";
  color: var(--lux);
  margin-right: 6px;
}
body.luxta-mode .msg.ai { color: #F5F0E6; }
.msg mark {
  background: var(--lux);
  color: #000;
  padding: 0 2px;
}
.inline-whisper {
  display: block;
  margin-top: 4px;
  font-size: .74rem;
  color: #bdb7aa;
  opacity: .72;
}
.floating-whisper {
  position: fixed;
  z-index: 220;
  background: rgba(0,0,0,.94);
  border: 1px solid rgba(237,145,7,.3);
  border-radius: 10px;
  padding: 6px 8px;
  color: #d2cec2;
  font-size: .72rem;
  max-width: 260px;
  display: none;
}

.composer-wrap {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 14px 18px 24px;
  background: #000;
  z-index: 8;
}
.composer {
  display: flex;
  align-items: flex-end;
  gap: 12px;
}
.input-wrapper { flex: 1; position: relative; }
textarea {
  width: 100%;
  background: rgba(17, 17, 17, 0.82);
  border: 1px solid rgba(237, 145, 7, 0.88);
  border-radius: 26px;
  padding: 14px 18px;
  font-family: "Inter", sans-serif;
  font-size: 0.92rem;
  color: var(--fg);
  resize: none;
  min-height: 54px;
  max-height: 150px;
}
textarea:focus { border-color: var(--lux); outline: none; }
textarea::placeholder { color: var(--muted); opacity: 0.7; }
.send-btn {
  height: 54px;
  padding: 0 24px;
  border: none;
  border-radius: 40px;
  background: rgba(237, 145, 7, 0.9);
  color: #000;
  font-weight: 600;
  cursor: pointer;
}
.voice-btn {
  width: 54px;
  height: 54px;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.mic-ring {
  width: 30px;
  height: 30px;
  border: 2px solid var(--lux);
  border-radius: 44% 56% 52% 48% / 48% 52% 45% 55%;
  position: relative;
  animation: micIdle 2.5s ease-in-out infinite;
}
.mic-ring::after {
  content: "";
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(237,145,7,.7);
  border-radius: 42% 58% 50% 50% / 52% 48% 56% 44%;
}
@keyframes micIdle {
  0%, 100% { transform: scale(1); opacity: .92; }
  50% { transform: scale(1.06); opacity: 1; }
}
.voice-btn.recording .mic-ring {
  animation-duration: .35s;
}
.recorder-panel {
  display: none;
  flex: 1;
  min-height: 92px;
  border: 1px solid rgba(237,145,7,0.45);
  border-radius: 24px;
  background: #070707;
  padding: 10px 12px;
}
.recorder-panel.active { display: block; }
#eqCanvas {
  width: 100%;
  height: 64px;
  display: block;
  image-rendering: pixelated;
}
.recorder-meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: #B8B1A3;
  font-size: 0.72rem;
  margin-top: 4px;
}
.recorder-transcript {
  color: var(--fg);
  opacity: 0.78;
  font-size: 0.78rem;
  margin-top: 4px;
  min-height: 16px;
}
.record-progress {
  height: 3px;
  background: rgba(237,145,7,0.18);
  margin-top: 6px;
  overflow: hidden;
}
.record-progress span {
  display: block;
  height: 100%;
  width: 0%;
  background: var(--lux);
}

.light-line {
  position: absolute;
  top: -2px;
  left: -2px;
  width: calc(100% + 4px);
  height: calc(100% + 4px);
  border: 2px solid transparent;
  border-radius: 28px;
  pointer-events: none;
  display: none;
}
body.luxdream-mode .light-line { display: block; }
.light-line.run { animation: borderGlow 1s linear forwards; }
@keyframes borderGlow {
  0% { border-color: transparent; clip-path: inset(0 100% 100% 0); }
  25% { border-color: var(--lux); clip-path: inset(0 0 94% 0); }
  50% { border-color: var(--lux); clip-path: inset(0 0 0 94%); }
  75% { border-color: var(--lux); clip-path: inset(94% 0 0 0); }
  100% { border-color: var(--lux); clip-path: inset(0 0 0 0); }
}

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 19;
}
.menu-overlay.active { display: block; }
.side-menu {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100vh;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  border-left: 1px solid rgba(237,145,7,0.3);
  padding: 76px 16px 18px;
  transition: right 0.25s ease, opacity .2s ease;
  z-index: 20;
  overflow-y: auto;
}
.side-menu.open { right: 0; }
.menu-section { margin-bottom: 20px; }
.menu-title {
  font-size: 0.74rem;
  letter-spacing: 1px;
  color: #AEB5B8;
  margin-bottom: 10px;
}
.menu-items { display: flex; flex-direction: column; gap: 8px; }
.menu-item {
  border: 1px solid rgba(237,145,7,0.3);
  border-radius: 28px;
  padding: 9px 10px;
  text-align: center;
  color: #B8B1A3;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
  font-size: .8rem;
}
.menu-item.active { border-color: var(--lux); color: var(--lux); }
.menu-item.fark { background: #B85C5A; border: none; color: #000; }
.tiny-row { display: flex; gap: 8px; margin-top: 8px; }
.tiny-row .menu-item { flex: 1; font-size: 0.72rem; padding: 8px 6px; }
.luxta-panel {
  margin-top: 8px;
  border: 1px solid rgba(237,145,7,.2);
  border-radius: 12px;
  padding: 8px 10px;
  background: rgba(0,0,0,.45);
  max-height: 320px;
  overflow-y: auto;
}
.sound-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  color: #bcb5a9;
  font-family: "Plus Jakarta Sans", sans-serif;
  font-weight: 300;
  font-size: .74rem;
  letter-spacing: .2px;
  cursor: pointer;
}
.sound-item > span { flex: 1; text-align: left; }
.sound-item.selected { color: var(--lux); }
.sound-info {
  width: 17px;
  height: 17px;
  border-radius: 50%;
  border: 1px solid rgba(237,145,7,.45);
  color: var(--lux);
  background: transparent;
  margin-left: auto;
  font-size: .62rem;
  line-height: 1;
  cursor: pointer;
}
.volume-slider {
  width: 100%;
  margin-top: 8px;
  accent-color: var(--lux);
}

/* left rail + drawer */
.left-edge {
  position: fixed;
  left: 0;
  top: var(--rail-top);
  bottom: var(--rail-bottom);
  width: 120px;
  background: transparent;
  z-index: 30;
  cursor: pointer;
}
.topic-rail {
  position: fixed;
  left: 0;
  top: var(--rail-top);
  bottom: var(--rail-bottom);
  width: 120px;
  z-index: 26;
  background: rgba(0,0,0,0.96);
  border-right: 1px solid rgba(237,145,7,0.18);
}
.topic-rail-scroll {
  height: 100%;
  overflow-y: auto;
  padding: 8px 8px 10px 10px;
}
.left-drawer {
  position: fixed;
  left: 0;
  top: var(--rail-top);
  bottom: var(--rail-bottom);
  width: 12px;
  background: rgba(0,0,0,0.96);
  border-right: 1px solid rgba(237,145,7,0.28);
  transition: width .22s ease;
  z-index: 29;
  overflow: hidden;
}
.left-drawer.open { width: min(36vw, 320px); }
.drawer-scroll {
  height: 100%;
  overflow-y: auto;
  opacity: 0;
  transition: opacity .12s ease;
  padding: 10px;
}
.left-drawer.open .drawer-scroll { opacity: 1; }
.left-drawer .drawer-head,
.left-drawer .drawer-sub,
.left-drawer #topicList { display: none; }
.drawer-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.drawer-head b {
  color: var(--lux);
  font-size: .68rem;
  letter-spacing: .9px;
  font-weight: 500;
}
.drawer-close {
  border: 1px solid rgba(237,145,7,.35);
  color: var(--lux);
  background: transparent;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
}
.drawer-sub {
  color: #8f979c;
  font-size: .62rem;
  margin-bottom: 8px;
}
.topic-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}
.topic-item {
  border: none;
  border-radius: 0;
  padding: 3px 0;
  cursor: pointer;
  background: transparent;
}
.topic-item.active { color: var(--lux-soft); }
.topic-title {
  color: #d4cfc4;
  font-size: .62rem;
  line-height: 1.32;
  font-family: "Plus Jakarta Sans", sans-serif;
  font-weight: 300;
  letter-spacing: .2px;
}
.topic-meta {
  margin-top: 3px;
  color: #8a8f92;
  font-size: .56rem;
}
.insight-pane {
  border-top: 1px solid rgba(237,145,7,.18);
  padding-top: 10px;
}
.left-drawer .insight-pane {
  border-top: none;
  padding-top: 0;
}
.insight-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.insight-head b {
  color: var(--lux-soft);
  font-size: .7rem;
  letter-spacing: .6px;
  font-weight: 500;
}
.insight-body {
  color: #beb7ac;
  font-size: .73rem;
  line-height: 1.55;
  white-space: pre-wrap;
}

/* context + overlays */
.context-menu {
  position: fixed;
  display: none;
  flex-direction: column;
  background: #111;
  border: 1px solid rgba(237,145,7,0.3);
  border-radius: 12px;
  padding: 6px 0;
  z-index: 100;
  min-width: 220px;
}
.context-menu button {
  background: none;
  border: none;
  padding: 8px 14px;
  text-align: left;
  color: #B8B1A3;
  width: 100%;
  cursor: pointer;
}
.context-menu button:hover { background: rgba(237,145,7,0.1); color: var(--lux); }

.popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(92vw, 560px);
  max-height: 76vh;
  overflow: auto;
  background: #070707;
  border: 1px solid rgba(237,145,7,0.35);
  border-radius: 18px;
  padding: 18px;
  z-index: 120;
  display: none;
}
.popup.active { display: block; }
.popup-title { color: var(--lux); letter-spacing: 1px; font-size: .86rem; margin-bottom: 12px; }
.popup-content { color: #B8B1A3; font-size: .86rem; line-height: 1.5; }
.popup-close {
  position: absolute; top: 10px; right: 12px; background: none; border: none;
  color: var(--lux); font-size: 18px; cursor: pointer;
}
.note-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.note-dot {
  width: 16px; height: 16px; border: 1px solid rgba(237,145,7,.45); border-radius: 50%;
  margin-top: 3px; flex: 0 0 auto; cursor: pointer;
}
.note-dot.selected { background: var(--lux); }
.note-text { flex: 1; }

.share-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.84);
  z-index: 180;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 12px;
}
.share-overlay.active { display: flex; }
.share-shell {
  width: min(96vw, 980px);
  max-height: 94vh;
  background: #040404;
  border: 1px solid rgba(237,145,7,.28);
  border-radius: 16px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.share-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.tool-btn {
  border: 1px solid rgba(237,145,7,.33);
  background: #090909;
  color: #d8d2c7;
  border-radius: 16px;
  padding: 6px 10px;
  font-size: .72rem;
  cursor: pointer;
}
.tool-btn.active { border-color: var(--lux); color: var(--lux); }
.editor-wrap {
  position: relative;
  width: 100%;
  min-height: 320px;
  max-height: 62vh;
  overflow: auto;
  border: 1px solid rgba(237,145,7,.2);
  background: #000;
}
#editorCanvas {
  display: block;
  max-width: 100%;
  margin: 0 auto;
  image-rendering: pixelated;
}
.share-targets {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.share-btn {
  border: 1px solid rgba(237,145,7,.36);
  border-radius: 999px;
  padding: 7px 12px;
  color: #d2cbbd;
  background: #080808;
  cursor: pointer;
  font-size: .74rem;
}

body.luxta-mode .header,
body.luxta-mode .header-tools {
  opacity: 0;
  transition: opacity .2s;
}
body.luxta-mode .header:hover,
body.luxta-mode .header-tools:hover,
body.luxta-mode.luxta-top-visible .header,
body.luxta-mode.luxta-top-visible .header-tools {
  opacity: .4;
}
body.luxta-mode .side-menu.open { opacity: .85; }
body.luxta-mode .composer-wrap { opacity: .7; }
body.luxta-mode .msg.ai { color: #F5F0E6; }
body.luxta-mode #voiceButton { opacity: .7; }
body.luxta-mode .left-edge { opacity: .18; }
body.luxta-mode textarea { background: rgba(17, 17, 17, 0.78); }
body.luxta-mode .send-btn { background: rgba(237, 145, 7, 0.86); }

body.luxeph-mode { user-select: none; }
body.luxeph-mode .light-line,
body.luxeph-mode .recorder-panel,
body.luxeph-mode #eqCanvas,
body.luxeph-mode .share-overlay,
body.luxeph-mode .context-menu { display: none !important; }
.screen-shield {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: none;
}
.screen-shield.active { display: block; }
@media print {
  body * { visibility: hidden !important; }
  body::before {
    content: "";
    visibility: visible;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 99999;
  }
}
@media (max-width: 720px) {
  .logo { font-size: 2.1rem; }
  .send-btn { padding: 0 16px; font-size: 0.74rem; }
  .search-capsule.open { width: 56vw; }
  .glyph-strip { height: 72px; }
  .topic-rail { width: 96px; }
  .left-edge { left: 0; width: 96px; }
  .left-drawer { left: 0; }
  .left-drawer.open { width: min(80vw, 320px); }
}
</style>
</head>
<body>
<div id="screenShield" class="screen-shield"></div>
<div id="floatingWhisper" class="floating-whisper"></div>

<div id="leftEdge" class="left-edge"></div>
<aside id="topicRail" class="topic-rail">
  <div class="topic-rail-scroll">
    <div id="topicListRail" class="topic-list"></div>
  </div>
</aside>
<aside id="leftDrawer" class="left-drawer">
  <div class="drawer-scroll">
    <div class="drawer-head">
      <b>KONU BASLIKLARI</b>
      <button id="drawerClose" class="drawer-close">×</button>
    </div>
    <div class="drawer-sub">Son 14 gun</div>
    <div id="topicList" class="topic-list"></div>
    <div class="insight-pane">
      <div class="insight-head">
        <b id="insightTitle">Aciklama</b>

function deeplTargetCode(lang) {

  };

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[s]));
}
function escapeRegExp(str) { return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

function recordTypingSignal(e) {
  const now = Date.now();
  if (!typingSignals.startedAt) typingSignals.startedAt = now;
  if (typingSignals.lastKeyAt > 0) {
    const pause = now - typingSignals.lastKeyAt;
    if (pause >= 120 && pause <= 7000) typingSignals.pauses.push(pause);
  }
  typingSignals.lastKeyAt = now;
  if (e && e.key && e.key.length === 1) typingSignals.keyCount += 1;
  if (e && e.key === "Backspace") typingSignals.backspaceCount += 1;
}
function resetTypingSignals() {
  typingSignals.startedAt = 0;
  typingSignals.keyCount = 0;
  typingSignals.backspaceCount = 0;
  typingSignals.pauses = [];
  typingSignals.lastKeyAt = 0;
}
function collectClientSignals() {
  const now = Date.now();
  const elapsedMin = typingSignals.startedAt ? Math.max(0.01, (now - typingSignals.startedAt) / 60000) : 0;
  const avgPause = typingSignals.pauses.length
    ? Math.round(typingSignals.pauses.reduce((a, b) => a + b, 0) / typingSignals.pauses.length)
    : 0;
  const charsPerMin = elapsedMin > 0 ? Math.round(typingSignals.keyCount / elapsedMin) : 0;
  const backspaceRatio = typingSignals.keyCount > 0
    ? Number((typingSignals.backspaceCount / typingSignals.keyCount).toFixed(3))
    : 0;
  return {
    typing: {
      chars_per_min: charsPerMin,
      avg_pause_ms: avgPause,
      backspace_ratio: backspaceRatio
    },
    voice: {
      energy: Number((lastVoiceEnergy || 0).toFixed(3)),
      speech_rate_wpm: Number((lastSpeechRateWpm || 0).toFixed(1))
    }
  };
}

    raw.conversations = raw.conversations.filter(c => new Date(c.updatedAt || c.createdAt || Date.now()).getTime() >= cutoff);
    return raw;

async function buildDynamicLanguagePack(lang) {
  if (dynamicLanguageCache[lang]) return dynamicLanguageCache[lang];
  const target = deeplTargetCode(lang);
  const baseDict = textMap.tr;
  const baseUi = uiLocale.tr;
  const tr = async (s) => {
    try {
      const out = await translateText(s, target);
      return out && String(out).trim() ? out : s;
    } catch (_) {
      return s;
    }
  };

  const [
    tagline, placeholder, greetMorning, greetDay, greetEvening, greetNight,
    drawerTitle, drawerSub, insightDefault, insightTitle, searchPlaceholder, searchTitle, searchMatches,
    fark, summary, memory, notes, modes, sound, language,
    female, male, podcast, night, soundOn, soundOff, luxchingPrompt, luxdreamPrompt, luxdreamGreeting,
    noData, noSummary, noMemory, noNotes, notesSelectAll, notesDelete, notesSaved,
    awarenessEmotion, awarenessTheme, awarenessGrowth, awarenessOpenThemes, memoryThemes, memorySymbols, memoryRecords
  ] = await Promise.all([
    tr(baseDict.tagline), tr(baseDict.placeholder), tr(baseDict.greetMorning), tr(baseDict.greetDay), tr(baseDict.greetEvening), tr(baseDict.greetNight),
    tr(baseUi.drawerTitle), tr(baseUi.drawerSub), tr(baseUi.insightDefault), tr(baseUi.insightTitle), tr(baseUi.searchPlaceholder), tr(baseUi.searchTitle), tr(baseUi.searchMatches),
    tr(baseUi.fark), tr(baseUi.summary), tr(baseUi.memory), tr(baseUi.notes), tr(baseUi.modes), tr(baseUi.sound), tr(baseUi.language),
    tr(baseUi.female), tr(baseUi.male), tr(baseUi.podcast), tr(baseUi.night), tr(baseUi.soundOn), tr(baseUi.soundOff),
    tr(baseUi.luxchingPrompt), tr(baseUi.luxdreamPrompt), tr(baseUi.luxdreamGreeting),
    tr(baseUi.noData), tr(baseUi.noSummary), tr(baseUi.noMemory), tr(baseUi.noNotes), tr(baseUi.notesSelectAll), tr(baseUi.notesDelete), tr(baseUi.notesSaved),
    tr(baseUi.awarenessEmotion), tr(baseUi.awarenessTheme), tr(baseUi.awarenessGrowth), tr(baseUi.awarenessOpenThemes),
    tr(baseUi.memoryThemes), tr(baseUi.memorySymbols), tr(baseUi.memoryRecords)
  ]);

  const pack = {
    dict: { tagline, placeholder, greetMorning, greetDay, greetEvening, greetNight },
    ui: {
      drawerTitle, drawerSub, insightDefault, insightTitle, searchPlaceholder, searchTitle, searchMatches,
      fark, summary, memory, notes, modes, sound, language,
      female, male, podcast, night, soundOn, soundOff, luxchingPrompt, luxdreamPrompt, luxdreamGreeting,

    }
  };
  dynamicLanguageCache[lang] = pack;
  return pack;

async function localizeSoundItems(lang) {
  if (soundLocaleCache[lang]) {
    localizedSoundItems = soundLocaleCache[lang];
    return localizedSoundItems;
  }
  if (lang === "tr") {
    localizedSoundItems = [...soundItems];
    soundLocaleCache[lang] = localizedSoundItems;
    return localizedSoundItems;
  }
  const target = deeplTargetCode(lang);
  const tr = async (s) => {
    try {
      const out = await translateText(s, target);
      return out && String(out).trim() ? out : s;
    } catch (_) {
      return s;
    }
  };
  const items = await Promise.all(soundItems.map(async ([key, label, info, kind, freq]) => {
    const [l, i] = await Promise.all([tr(label), tr(info)]);
    return [key, l || label, i || info, kind, freq];
  }));
  soundLocaleCache[lang] = items;
  localizedSoundItems = items;
  return items;
}

function ensureAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function stopSound() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (oscillator) { try { oscillator.stop(); } catch (_) {} oscillator = null; }
  if (gainNode) { try { gainNode.disconnect(); } catch (_) {} gainNode = null; }
}
function setVolume(value) {
  if (currentAudio) currentAudio.volume = value;
  if (gainNode) gainNode.gain.value = value * 0.08;
}
function selectSound(key) {
  if (!soundEnabled) return;
  selectedSoundKey = key;
  document.querySelectorAll(".sound-item").forEach(x => x.classList.toggle("selected", x.dataset.sound === key));
  stopSound();
  const found = soundItems.find(x => x[0] === key);
  if (!found) return;
  const [, , , kind, freq] = found;
  const volume = Number(document.getElementById("volumeSlider")?.value || 30) / 100;
  if (kind === "natural") {
    currentAudio = new Audio(`/static/audio/${key}.mp3`);
    currentAudio.loop = true;
    currentAudio.volume = volume;
    currentAudio.play().catch(() => {});
    return;
  }
  const ctx = ensureAudioContext();
  oscillator = ctx.createOscillator();
  gainNode = ctx.createGain();
  oscillator.type = "sine";
  oscillator.frequency.value = key === "binaural" ? 220 + Number(freq || 7) : Number(freq || 10);
  gainNode.gain.value = volume * 0.08;
  oscillator.connect(gainNode);
  gainNode.connect(ctx.destination);
  oscillator.start();
}

function ensureSocket() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  ws.onopen = () => { wsReady = true; };
  ws.onerror = () => { wsReady = false; };
  ws.onclose = () => {
    wsReady = false;
    ws = null;
    if (wsPending && typeof wsPending.reject === "function") {
      wsPending.reject(new Error("socket_closed"));
      wsPending = null;
    }
    setTimeout(() => ensureSocket(), 900);
  };
  ws.onmessage = evt => {
    if (!wsPending || typeof wsPending.onMessage !== "function") return;
    let data = null;
    try { data = JSON.parse(evt.data || "{}"); } catch (_) { return; }
    wsPending.onMessage(data);
  };
}

function sendMessageViaSocket(payload, aiDiv) {
  return new Promise((resolve, reject) => {
    if (wsPending) {
      reject(new Error("socket_busy"));
      return;
    }
    ensureSocket();
    let attempts = 0;
    const waitForOpen = () => {
      attempts += 1;
      if (ws && ws.readyState === WebSocket.OPEN) {
        let streamed = "";
        wsPending = {
          onMessage(data) {
            if (data.type === "chunk") {
              const chunk = data.text || "";
              if (chunk) {
                streamed += chunk;
                aiDiv.innerText = streamed;
                scrollBottom();
              }
              return;
            }
            if (data.type === "done") {
              const finalText = (data.response || streamed || "Bunu duydum.").trim();
              wsPending = null;
              resolve(finalText);
            }
          },
          reject(err) {
            wsPending = null;
            reject(err);
          }
        };
        ws.send(JSON.stringify(payload));
        return;
      }
      if (attempts > 40) {
        reject(new Error("socket_not_ready"));
        return;
      }
      setTimeout(waitForOpen, 80);
    };
    waitForOpen();
  });
}

async function explainText(text, target, forceTranslate = false) {
  const clean = (text || "").trim().toLowerCase();
  if (!clean) return;
  const words = clean.split(/\s+/);
  const direct = termHints[clean] || words.map(w => termHints[w]).filter(Boolean)[0];
  let whisper = direct || "";
  const looksForeign = /[a-z]/i.test(clean) && !/[çğıöşü]/i.test(clean);
  if (forceTranslate || looksForeign || !whisper) {
    const translated = await translateText(text, deeplTargetCode(currentLang));
    if (translated && translated !== text) {
      whisper = whisper ? `${whisper} | ${translated}` : translated;
    }
  }
  if (!whisper) whisper = `"${text}" icin su an kisitli aciklama var.`;
  showInlineWhisper(whisper, target);
}

function showInlineWhisper(text, targetEl) {
  if (!targetEl) return;
  const sel = window.getSelection();
  if (sel && sel.rangeCount && sel.toString().trim()) {
    const range = sel.getRangeAt(0);
    const marker = document.createElement("span");
    marker.className = "inline-whisper";
    marker.innerText = text;
    try {
      range.collapse(false);
      range.insertNode(marker);
    } catch (_) {
      targetEl.appendChild(marker);
    }
    setTimeout(() => marker.remove(), 4000);
    return;
  }
  const marker = document.createElement("span");
  marker.className = "inline-whisper";
  marker.innerText = text;
  targetEl.appendChild(marker);
  setTimeout(() => marker.remove(), 4000);
}

  const spokenWords = (recordTranscriptText || "").trim().split(/\s+/).filter(Boolean).length;

function drawEqualizer() {
  const w = eqCanvas.width;
  const h = eqCanvas.height;
  const bars = 70;
  const data = new Uint8Array(analyser ? analyser.frequencyBinCount : bars);
  function draw() {
    eqCtx.clearRect(0, 0, w, h);
    if (analyser) analyser.getByteFrequencyData(data);
    let energySum = 0;
    for (let i = 0; i < bars; i++) {
      const value = analyser ? data[i] : Math.abs(Math.sin(Date.now() / 130 + i)) * 170;
      energySum += value;
      const bh = Math.max(4, (value / 255) * h);
      const x = Math.floor(i * (w / bars));
      const bw = Math.max(3, Math.floor(w / bars) - 2);
      eqCtx.fillStyle = i % 3 === 0 ? "#ED9107" : i % 3 === 1 ? "#F5D68A" : "#B85C5A";
      eqCtx.fillRect(x, h - bh, bw, bh);
    }
    lastVoiceEnergy = bars > 0 ? Math.max(0, Math.min(1, (energySum / bars) / 255)) : 0;
    if (recording) eqAnimation = requestAnimationFrame(draw);
  }
  draw();
}

async function openCardFromText(text) {
  if (!text || currentMode === "luxeph") return;
  editorActiveText = text;
  const canvas = document.createElement("canvas");
  canvas.width = 1080;
  canvas.height = 1080;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#ED9107";
  ctx.lineWidth = 4;
  ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);
  ctx.fillStyle = "#E8E5DF";
  ctx.font = "500 42px Inter";
  const lines = wrapTextForCanvas(ctx, text, 900);
  let y = 200;
  lines.slice(0, 16).forEach(line => { ctx.fillText(line, 90, y); y += 56; });
  loadEditorCanvas(canvas);
  shareOverlay.classList.add("active");
}

function wrapTextForCanvas(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxWidth) {
      if (line) lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

  if (shareEditorMode === "pen") {
    isDrawing = true;
    editorCtx.strokeStyle = shareDrawColor;
    editorCtx.lineWidth = shareLineSize;
    editorCtx.lineCap = "round";
    editorCtx.beginPath();
    editorCtx.moveTo(p.x, p.y);
  }
});
editorCanvas.addEventListener("mousemove", e => {
  const p = getCanvasPos(e);
  if (isDrawing) {
    editorCtx.lineTo(p.x, p.y);
    editorCtx.stroke();
  }
  if (isCropping && cropStart) {
    previewCropRect(cropStart, p);
  }
});
editorCanvas.addEventListener("mouseup", async e => {
  const p = getCanvasPos(e);
  if (isDrawing) {
    isDrawing = false;
    pushEditorHistory();
  }
  if (isCropping && cropStart) {
    await applyCrop(cropStart, p);
    isCropping = false;
    cropStart = null;
    pushEditorHistory();
  }
});

function getCanvasPos(e) {
  const rect = editorCanvas.getBoundingClientRect();
  const sx = editorCanvas.width / rect.width;
  const sy = editorCanvas.height / rect.height;
  return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
}
function previewCropRect(a, b) {
  if (!editorHistory.length) return;
  const base = editorHistory[editorHistory.length - 1];
  restoreFromDataUrl(base).then(() => {
    editorCtx.setLineDash([10, 8]);
    editorCtx.strokeStyle = "#ED9107";
    editorCtx.lineWidth = 2;
    editorCtx.strokeRect(Math.min(a.x, b.x), Math.min(a.y, b.y), Math.abs(a.x - b.x), Math.abs(a.y - b.y));
    editorCtx.setLineDash([]);
  });
}
async function applyCrop(a, b) {
  const x = Math.min(a.x, b.x);
  const y = Math.min(a.y, b.y);
  const w = Math.abs(a.x - b.x);
  const h = Math.abs(a.y - b.y);
  if (w < 20 || h < 20) return;
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  tmp.getContext("2d").drawImage(editorCanvas, x, y, w, h, 0, 0, w, h);
  editorCanvas.width = w;
  editorCanvas.height = h;
  editorCtx.drawImage(tmp, 0, 0);
}

document.getElementById("toolPen").onclick = () => setEditorMode("pen");
document.getElementById("toolCrop").onclick = () => setEditorMode("crop");
document.getElementById("toolText").onclick = () => setEditorMode("text");
document.getElementById("toolUndo").onclick = async () => {
  if (editorHistory.length <= 1) return;
  editorHistory.pop();
  await restoreFromDataUrl(editorHistory[editorHistory.length - 1]);
};
document.getElementById("toolReset").onclick = async () => {
  if (!editorHistory.length) return;
  await restoreFromDataUrl(editorHistory[0]);
  editorHistory = [editorHistory[0]];
};
document.getElementById("toolClose").onclick = () => { shareOverlay.classList.remove("active"); };
document.querySelectorAll(".tool-btn[data-color]").forEach(btn => {
  btn.onclick = () => {
    shareDrawColor = btn.dataset.color;
    document.querySelectorAll(".tool-btn[data-color]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
  };
});
document.querySelectorAll(".tool-btn[data-size]").forEach(btn => {
  btn.onclick = () => {
    shareLineSize = Number(btn.dataset.size || 4);
    document.querySelectorAll(".tool-btn[data-size]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
  };
});

function setEditorMode(mode) {
  shareEditorMode = mode;
  document.getElementById("toolPen").classList.toggle("active", mode === "pen");
  document.getElementById("toolCrop").classList.toggle("active", mode === "crop");
  document.getElementById("toolText").classList.toggle("active", mode === "text");
}

function stampSignature() {
  editorCtx.save();
  editorCtx.font = "16px Inter";
  editorCtx.fillStyle = "#A7A9AC";
  const sig = "LUXVIAI Light your way!";
  const w = editorCtx.measureText(sig).width;
  editorCtx.fillText(sig, editorCanvas.width - w - 18, editorCanvas.height - 16);
  editorCtx.restore();
}

async function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}
function openShareUrl(platform, text) {
  const u = {
    whatsapp: `https://wa.me/?text=${encodeURIComponent(text)}`,
    telegram: `https://t.me/share/url?url=&text=${encodeURIComponent(text)}`,
    x: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=&quote=${encodeURIComponent(text)}`,
    instagram: "https://www.instagram.com/",
    tiktok: "https://www.tiktok.com/"
  }[platform];
  if (u) window.open(u, "_blank", "noopener");
}
document.querySelectorAll(".share-btn").forEach(btn => {
  btn.onclick = async () => {
    const platform = btn.dataset.share;
    if (!platform) return;
    stampSignature();
    const blob = await canvasToBlob(editorCanvas);
    if (!blob) return;
    const file = new File([blob], "luxviai-card.png", { type: "image/png" });
    const shareText = editorActiveText || "LUXVIAI Light your way!";
    if (platform === "download") {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "luxviai-card.png";
      a.click();
      URL.revokeObjectURL(a.href);
      return;
    }
    if (platform === "native") {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], text: shareText, title: "LUXVIAI" }); } catch (_) {}
      } else {
        openShareUrl("whatsapp", shareText);
      }
      return;
    }
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], text: shareText, title: "LUXVIAI" }); } catch (_) { openShareUrl(platform, shareText); }
    } else {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "luxviai-card.png";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1200);
      openShareUrl(platform, shareText);
    }
  };
});

["copy", "cut", "paste"].forEach(evt => {
  document.addEventListener(evt, e => {
    if (currentMode === "luxeph") e.preventDefault();
  });
});
document.addEventListener("keydown", e => {
  if (currentMode === "luxeph" && (e.key === "PrintScreen" || ((e.ctrlKey || e.metaKey) && ["c","x","v","s","p"].includes(e.key.toLowerCase())))) {
    e.preventDefault();
    screenShield.classList.add("active");
    setTimeout(() => screenShield.classList.remove("active"), 900);
  }
});

document.addEventListener("mousemove", e => {
  if (currentMode !== "luxta") return;
  if (e.clientY < 90) {
    document.body.classList.add("luxta-top-visible");
    clearTimeout(luxTopTimer);
    luxTopTimer = setTimeout(() => document.body.classList.remove("luxta-top-visible"), 1200);
  }
});
document.addEventListener("touchstart", e => {
  if (currentMode !== "luxta") return;
  const t = e.touches[0];
  if (t && t.clientY < 120) {
    document.body.classList.add("luxta-top-visible");
    clearTimeout(luxTopTimer);
    luxTopTimer = setTimeout(() => document.body.classList.remove("luxta-top-visible"), 1600);
  }
}, { passive: true });

async function bootGreeting() {
  const instant = `${pickGreetingPrefix(getCurrentDict())}.`;
  const first = appendMessage("ai", instant || "Merhaba.");
  const detailed = await buildGreeting();
  if (detailed && detailed !== instant) {
    first.innerText = detailed;
    const conv = getActiveConversation();
    if (conv.messages.length) conv.messages[conv.messages.length - 1].text = detailed;
    saveHistory();
  }
}

async function initApp() {
  populateLanguages();
  try {
    await applyLanguage(currentLang);
  } catch (_) {
    activeDict = textMap.tr;
    activeUi = uiLocale.tr;
    localizedSoundItems = [...soundItems];
    buildLuxtaPanel();
  }

  drawGlyphStrip();
  resolveHiddenLocation();

  if (!activeConversationId || !userHistory.conversations.find(c => c.id === activeConversationId)) {
    createConversation(currentMode);
    renderTopicList();
    setEditorMode("pen");
    await bootGreeting();
    return;
  }

  loadConversation(activeConversationId);
  renderTopicList();
  setEditorMode("pen");
}

initApp();
</script>
