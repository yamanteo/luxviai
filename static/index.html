<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Luxviai — Light your way!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --lux: #ED9107;
  --lux-soft: #F5D68A;
  --bg: #000;
  --fg: #E8E5DF;
  --muted: #9AA3A6;
  --platinum: #A7A9AC;
  --scroll-thumb: #15181D;
  --rail-top: 72px;
  --rail-bottom: 18px;
  --app-height: 100dvh;
  --mobile-bottom-offset: 0px;
  --mobile-nav-guard: 0px;
  --keyboard-lift: 0px;
}
html {
  height: 100%;
  min-height: 100svh;
  min-height: var(--app-height);
}
body {
  background: var(--bg);
  font-family: "Inter", sans-serif;
  color: var(--fg);
  height: 100%;
  min-height: 100svh;
  min-height: var(--app-height);
  overflow: hidden;
}
*::-webkit-scrollbar { width: 6px; height: 6px; }
*::-webkit-scrollbar-track { background: #000; }
*::-webkit-scrollbar-thumb { background: #5A5D63; border-radius: 8px; min-height: 28px; }
* { scrollbar-color: #5A5D63 #000; scrollbar-width: thin; }

.app {
  width: 100%;
  max-width: 1280px;
  height: 100%;
  min-height: 100svh;
  min-height: var(--app-height);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.header {
  text-align: center;
  padding: 18px 20px 10px;
  border-bottom: 1px solid rgba(237,145,7,0.2);
  background: #000;
  z-index: 10;
  position: relative;
}
.logo {
  font-family: "Plus Jakarta Sans", sans-serif;
  font-size: 2.7rem;
  font-weight: 300;
  letter-spacing: 5px;
  color: var(--lux);
}
.tagline {
  margin-top: 8px;
  font-size: 0.9rem;
  letter-spacing: 2px;
  color: var(--muted);
  opacity: 0.7;
}
.header-tools {
  position: absolute;
  right: 18px;
  bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 4px;
}
.header-tools-left {
  position: absolute;
  left: 18px; /* ~0.5 cm */
  bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 4px;
  z-index: 2;
}
.header-tools::after {
  display: none;
}
.search-capsule {
  height: 36px;
  border: 1px solid rgba(237,145,7,0.34);
  border-radius: 999px;
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.85);
  width: 0;
  overflow: hidden;
  opacity: 0;
  transition: width .25s ease, opacity .2s ease;
}
.search-capsule.open {
  width: min(54vw, 320px);
  opacity: 1;
}
.search-capsule input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--fg);
  padding: 0 10px 0 12px;
  font-size: .8rem;
  outline: none;
}
.search-capsule button {
  border: none;
  background: transparent;
  color: var(--lux);
  width: 34px;
  height: 34px;
  cursor: pointer;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(237,145,7,0.4);
  background: rgba(0,0,0,0.75);
  color: var(--lux);
  cursor: pointer;
}
.menu-btn {
  width: 42px;
  height: 42px;
  background: none;
  border: none;
  color: #C9974D;
  font-size: 26px;
  cursor: pointer;
}
.new-chat-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(237,145,7,0.52);
  background: rgba(0,0,0,0.72);
  color: #F0C16A;
  font-size: .62rem;
  line-height: 1.05;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  padding-top: 2px;
  cursor: pointer;
}
.new-chat-btn .new-chat-text {
  font-size: .48rem;
  letter-spacing: .35px;
  font-weight: 600;
}
.new-chat-btn .new-chat-plus {
  font-size: .82rem;
  line-height: .9;
  font-weight: 500;
}
.new-chat-btn.inactive {
  opacity: .32;
  pointer-events: none;
}

.glyph-strip {
  width: 100%;
  height: 0;
  background: #000;
  position: relative;
  overflow: hidden;
  pointer-events: none;
}
#glyphCanvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  display: block;
}

.chat-box {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 20px;
  margin-right: 0;
  padding-right: 6px;
  padding-bottom: 180px;
  position: relative;
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}
.chat-box::before {
  content: "";
  margin-top: auto;
}
.chat-box::-webkit-scrollbar { display: none; }
.chat-scrollbar {
  position: fixed;
  right: 6px;
  top: var(--chat-scroll-top, 112px);
  bottom: var(--chat-scroll-bottom, 122px);
  width: 4px;
  background: transparent;
  pointer-events: none;
  z-index: 11;
}
.chat-scroll-thumb {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 19px; /* ~0.5 cm */
  border-radius: 999px;
  background: var(--scroll-thumb);
  opacity: .9;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
}
.chat-new-indicator {
  position: fixed;
  right: 14px;
  bottom: calc(96px + max(env(safe-area-inset-bottom), 10px));
  z-index: 28;
  border: 1px solid rgba(237,145,7,.42);
  border-radius: 999px;
  background: rgba(8,8,8,.92);
  color: #E1D2B4;
  font-size: .7rem;
  line-height: 1;
  padding: 8px 12px;
  cursor: pointer;
  display: none;
}
.chat-new-indicator.show { display: inline-flex; align-items: center; }
body.luxdream-mode .chat-box::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 6% 22%, rgba(237,145,7,.42) 0 1px, transparent 1.4px),
    radial-gradient(circle at 14% 70%, rgba(245,214,138,.36) 0 1px, transparent 1.4px),
    radial-gradient(circle at 25% 42%, rgba(237,145,7,.30) 0 1px, transparent 1.4px),
    radial-gradient(circle at 37% 18%, rgba(245,214,138,.34) 0 1px, transparent 1.4px),
    radial-gradient(circle at 49% 63%, rgba(237,145,7,.30) 0 1px, transparent 1.4px),
    radial-gradient(circle at 63% 35%, rgba(245,214,138,.38) 0 1px, transparent 1.4px),
    radial-gradient(circle at 78% 74%, rgba(237,145,7,.34) 0 1px, transparent 1.4px),
    radial-gradient(circle at 89% 24%, rgba(245,214,138,.36) 0 1px, transparent 1.4px),
    radial-gradient(circle at 96% 56%, rgba(237,145,7,.28) 0 1px, transparent 1.4px);
  image-rendering: pixelated;
  animation: dreamSparkle 9s steps(5, end) infinite;
  opacity: .12;
}
@keyframes dreamSparkle {
  0% { opacity: .05; }
  25% { opacity: .10; }
  50% { opacity: .07; }
  75% { opacity: .12; }
  100% { opacity: .05; }
}
.msg {
  max-width: fit-content;
  margin-bottom: 16px;
  line-height: 1.5;
  font-size: 0.95rem;
  word-break: break-word;
  position: relative;
}
.msg.user {
  margin-left: auto;
  background: #111;
  border: 1px solid rgba(237,145,7,0.2);
  padding: 10px 16px;
  border-radius: 22px;
}
.msg.ai {
  margin-right: auto;
  padding: 4px 0;
}
.msg.ai::before {
  content: "-";
  color: var(--lux);
  margin-right: 6px;
}
body.luxta-mode .msg.ai { color: #F2EBDD; }
.msg mark {
  background: var(--lux);
  color: #000;
  padding: 0 2px;
}
.inline-whisper {
  display: block;
  margin: 6px 0 0 0;
  padding: 5px 8px;
  max-width: min(92%, 620px);
  background: #EFE2C8;
  color: #111;
  border: 1px solid rgba(0,0,0,.16);
  border-radius: 8px;
  font-size: .72rem;
  font-style: italic;
  font-weight: 400;
  line-height: 1.35;
  opacity: .94;
}
.resume-btn {
  display: inline-flex;
  align-items: center;
  margin: 6px 0 14px 0;
  padding: 6px 12px;
  border: 1px solid rgba(237,145,7,.44);
  border-radius: 999px;
  background: #0a0a0a;
  color: #E6D6B4;
  font-size: .72rem;
  cursor: pointer;
  width: auto;
  max-width: max-content;
  white-space: nowrap;
}
.resume-btn:hover { color: #ED9107; border-color: #ED9107; }
.toast-mini {
  position: fixed;
  left: 50%;
  bottom: calc(84px + max(env(safe-area-inset-bottom), 10px));
  transform: translateX(-50%);
  z-index: 250;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(237,145,7,.34);
  background: rgba(8,8,8,.9);
  color: #D9CBAF;
  font-size: .7rem;
  line-height: 1;
  opacity: 0;
  transition: opacity .12s ease;
  pointer-events: none;
}
.toast-mini.show { opacity: 1; }
.floating-whisper {
  position: fixed;
  z-index: 220;
  background: rgba(0,0,0,.94);
  border: 1px solid rgba(237,145,7,.3);
  border-radius: 10px;
  padding: 6px 8px;
  color: #d2cec2;
  font-size: .72rem;
  max-width: 260px;
  display: none;
}

.composer-wrap {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 14px 18px calc(14px + max(env(safe-area-inset-bottom), 14px));
  background: #000;
  z-index: 8;
}
.composer {
  display: flex;
  align-items: flex-end;
  gap: 12px;
}
.input-wrapper { flex: 1; position: relative; }
textarea {
  width: 100%;
  background: rgba(17, 17, 17, 0.82);
  border: 1px solid rgba(237, 145, 7, 0.88);
  border-radius: 26px;
  padding: 14px 18px;
  font-family: "Inter", sans-serif;
  font-size: 0.92rem;
  color: var(--fg);
  resize: none;
  min-height: 54px;
  max-height: 150px;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
textarea::-webkit-scrollbar { display: none; }
textarea:focus { border-color: var(--lux); outline: none; }
textarea::placeholder { color: var(--muted); opacity: 0.7; }
.send-btn {
  height: 54px;
  padding: 0 24px;
  border: none;
  border-radius: 40px;
  background: rgba(237, 145, 7, 0.9);
  color: #000;
  font-weight: 600;
  cursor: pointer;
}
.voice-btn {
  width: 54px;
  height: 54px;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.mic-ring {
  width: 30px;
  height: 30px;
  border: 2px solid var(--lux);
  border-radius: 44% 56% 52% 48% / 48% 52% 45% 55%;
  position: relative;
  animation: micIdle 2.5s ease-in-out infinite;
}
.mic-ring::after {
  content: "";
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(237,145,7,.7);
  border-radius: 42% 58% 50% 50% / 52% 48% 56% 44%;
}
@keyframes micIdle {
  0%, 100% { transform: scale(1); opacity: .92; }
  50% { transform: scale(1.06); opacity: 1; }
}
.voice-btn.recording .mic-ring {
  animation-duration: .35s;
}
.recorder-panel {
  display: none;
  flex: 1;
  min-height: 92px;
  border: 1px solid rgba(237,145,7,0.45);
  border-radius: 24px;
  background: #070707;
  padding: 10px 12px;
}
.recorder-panel.active { display: block; }
#eqCanvas {
  width: 100%;
  height: 64px;
  display: block;
  image-rendering: pixelated;
}
.recorder-meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: #B8B1A3;
  font-size: 0.72rem;
  margin-top: 4px;
}
.recorder-transcript {
  color: var(--fg);
  opacity: 0.78;
  font-size: 0.78rem;
  margin-top: 4px;
  min-height: 16px;
}
.record-progress {
  height: 3px;
  background: rgba(237,145,7,0.18);
  margin-top: 6px;
  overflow: hidden;
}
.record-progress span {
  display: block;
  height: 100%;
  width: 0%;
  background: var(--lux);
}

.light-line {
  position: absolute;
  top: -2px;
  left: -2px;
  width: calc(100% + 4px);
  height: calc(100% + 4px);
  border: 2px solid transparent;
  border-radius: 28px;
  pointer-events: none;
  display: none;
}
body.luxdream-mode .light-line { display: block; }
.light-line.run { animation: borderGlow 1s linear forwards; }
@keyframes borderGlow {
  0% { border-color: transparent; clip-path: inset(0 100% 100% 0); }
  25% { border-color: var(--lux); clip-path: inset(0 0 94% 0); }
  50% { border-color: var(--lux); clip-path: inset(0 0 0 94%); }
  75% { border-color: var(--lux); clip-path: inset(94% 0 0 0); }
  100% { border-color: var(--lux); clip-path: inset(0 0 0 0); }
}

.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 19;
}
.menu-overlay.active { display: block; }
.side-menu {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: var(--app-height);
  min-height: 100svh;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  border-left: 1px solid rgba(237,145,7,0.3);
  padding: 76px 16px 18px;
  transition: right 0.25s ease, opacity .2s ease;
  z-index: 20;
  overflow-y: auto;
}
.side-menu.open { right: 0; }
.menu-section { margin-bottom: 20px; }
.menu-title {
  font-size: 0.74rem;
  letter-spacing: 1px;
  color: #AEB5B8;
  margin-bottom: 10px;
}
.menu-items { display: flex; flex-direction: column; gap: 8px; }
.menu-item {
  border: 1px solid rgba(237,145,7,0.3);
  border-radius: 28px;
  padding: 9px 10px;
  text-align: center;
  color: #B8B1A3;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
  font-size: .8rem;
}
.menu-item.active { border-color: var(--lux); color: var(--lux); }
.menu-item.fark { background: #B85C5A; border: none; color: #000; }
.tiny-row { display: flex; gap: 8px; margin-top: 8px; }
.tiny-row .menu-item { flex: 1; font-size: 0.72rem; padding: 8px 6px; }
.luxta-panel {
  margin-top: 8px;
  border: 1px solid rgba(237,145,7,.2);
  border-radius: 12px;
  padding: 8px 10px;
  background: rgba(0,0,0,.45);
  max-height: 320px;
  overflow-y: auto;
}
.sound-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  color: #bcb5a9;
  font-family: "Plus Jakarta Sans", sans-serif;
  font-weight: 300;
  font-size: .74rem;
  letter-spacing: .2px;
  cursor: pointer;
}
.sound-item > span { flex: 1; text-align: left; }
.sound-item.selected { color: var(--lux); }
.sound-info {
  width: 17px;
  height: 17px;
  border-radius: 50%;
  border: 1px solid rgba(237,145,7,.45);
  color: var(--lux);
  background: transparent;
  margin-left: auto;
  font-size: .62rem;
  line-height: 1;
  cursor: pointer;
}
.volume-slider {
  width: 100%;
  margin-top: 8px;
  accent-color: var(--lux);
}

/* left rail + drawer */
.left-edge {
  display: none;
}
.topic-rail {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 180px; /* daraltildi */
  z-index: 26;
  background: rgba(8,8,8,0.98);
  border-right: none;
}
.topic-rail-scrollbar {
  position: absolute;
  right: 3px;
  top: var(--topic-scroll-top, 112px);
  bottom: var(--topic-scroll-bottom, 122px);
  width: 4px;
  background: transparent;
  pointer-events: none;
  z-index: 3;
}
.topic-rail-thumb {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 19px; /* ~0.5 cm */
  border-radius: 999px;
  background: var(--scroll-thumb);
  opacity: .92;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
}
.topic-rail-scroll {
  height: 100%;
  overflow-y: auto;
  padding: 14px 14px calc(18px + env(safe-area-inset-bottom));
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.topic-rail-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
.topic-search-wrap {
  position: sticky;
  top: 0;
  z-index: 2;
  background: rgba(8,8,8,0.98);
  padding-bottom: 10px;
}
.topic-search {
  width: 100%;
  height: 40px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.06);
  background: #171717;
  color: #D4D6DB;
  font-size: .95rem;
  padding: 0 14px;
  outline: none;
}
.topic-section-title {
  margin: 12px 4px 8px;
  color: var(--lux);
  font-size: .52rem;
  font-weight: 600;
  letter-spacing: .45px;
  text-transform: uppercase;
}
.left-drawer {
  position: fixed;
  left: 180px;
  top: 0;
  bottom: 0;
  width: 0;
  background: rgba(6,6,6,0.98);
  border-right: none;
  transition: width .22s ease;
  z-index: 34;
  overflow: hidden;
}
.left-drawer.open { width: min(30vw, 270px); }
.drawer-scroll {
  height: 100%;
  overflow-y: auto;
  opacity: 0;
  transition: opacity .12s ease;
  padding: 16px 14px calc(18px + env(safe-area-inset-bottom));
}
.left-drawer.open .drawer-scroll { opacity: 1; }
.left-drawer .drawer-head,
.left-drawer .drawer-sub,
.left-drawer #topicList { display: block; }
.drawer-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.drawer-head b {
  color: var(--lux);
  font-size: .68rem;
  letter-spacing: .9px;
  font-weight: 500;
}
.drawer-close {
  border: 1px solid rgba(237,145,7,.35);
  color: var(--lux);
  background: transparent;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
}
.drawer-sub {
  color: #8f979c;
  font-size: .62rem;
  margin-bottom: 8px;
}
.topic-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}
.topic-item {
  border: 1px solid transparent;
  border-radius: 12px;
  padding: 8px 10px;
  cursor: pointer;
  background: transparent;
}
.topic-item:hover {
  background: rgba(237,145,7,.06);
  border-color: rgba(237,145,7,.18);
}
.topic-item.active {
  color: var(--lux-soft);
  background: rgba(237,145,7,.06);
  border-color: rgba(237,145,7,.42);
}
.topic-title {
  color: #DDE2EA;
  font-size: .66rem;
  line-height: 1.25;
  font-family: "Inter", sans-serif;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: uppercase;
}
.topic-meta {
  margin-top: 2px;
  color: #8F97A6;
  font-size: .45rem;
  line-height: 1.32;
  text-transform: none;
}
.insight-pane {
  border-top: 1px solid rgba(237,145,7,.18);
  padding-top: 10px;
}
.left-drawer .insight-pane {
  border-top: none;
  padding-top: 0;
}
.insight-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.insight-head b {
  color: var(--lux-soft);
  font-size: .7rem;
  letter-spacing: .6px;
  font-weight: 500;
}
.insight-body {
  color: #beb7ac;
  font-size: .73rem;
  line-height: 1.55;
  white-space: pre-wrap;
}
.topic-insight {
  display: none;
  margin: 0 2px 10px;
  border: 1px solid rgba(237,145,7,.24);
  border-radius: 12px;
  background: rgba(10,10,10,.95);
  overflow: hidden;
}
.topic-insight.open { display: block; }
.topic-insight-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(237,145,7,.18);
}
.topic-insight-head b {
  color: var(--lux-soft);
  font-size: .56rem;
  letter-spacing: .35px;
  text-transform: uppercase;
}

function ensureClientStateVersion() {
  try {
    const prev = localStorage.getItem(CLIENT_STATE_VERSION_KEY);
    if (prev === CLIENT_STATE_VERSION) return;
    ["lux_history_v1", "lux_history_v2", "lux_history_v3"].forEach(k => localStorage.removeItem(k));
    localStorage.setItem(CLIENT_STATE_VERSION_KEY, CLIENT_STATE_VERSION);
  } catch (_) {}
}

function normalizeHintKey(s) {
  return String(s || "")
    .toLowerCase()
    .replace(/[İIı]/g, "i")
    .replace(/ğ/g, "g")
    .replace(/ü/g, "u")
    .replace(/ş/g, "s")
    .replace(/ö/g, "o")
    .replace(/ç/g, "c")
    .replace(/[^a-z0-9\s-]/g, "")
    .trim();
}

function getCurrentDict() {
  return activeDict || textMap[currentLang] || textMap.tr;
}
function getCurrentUi() {
  return activeUi || uiLocale[currentLang] || uiLocale.tr;
}
function tDict(key, fallback = "") {
  const dict = getCurrentDict() || {};
  const v = dict[key];
  if (v !== undefined && v !== null && String(v).trim() !== "") return String(v);
  const tr = textMap.tr || {};
  if (tr[key] !== undefined) return String(tr[key]);
  const miss = `dict:${key}`;
  if (!missingI18nKeys.has(miss)) {
    missingI18nKeys.add(miss);
    console.warn("Missing dictionary key:", key, "lang:", currentLang);
  }
  return fallback || key;
}
function tUi(key, fallback = "") {
  const ui = getCurrentUi() || {};
  const v = ui[key];
  if (v !== undefined && v !== null && String(v).trim() !== "") return String(v);
  const tr = uiLocale.tr || {};
  if (tr[key] !== undefined) return String(tr[key]);
  const miss = `ui:${key}`;
  if (!missingI18nKeys.has(miss)) {
    missingI18nKeys.add(miss);

}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[s]));
}
function escapeRegExp(str) { return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
function setAppHeight() {
  const vv = window.visualViewport;
  const layoutHeight = Math.round(window.innerHeight || document.documentElement.clientHeight || 0);
  const visualHeight = Math.round(vv ? vv.height : layoutHeight);
  const visualTop = Math.round(vv ? vv.offsetTop : 0);
  const visualBottom = visualTop + visualHeight;
  const occludedBottom = Math.max(0, layoutHeight - visualBottom);
  const isMobile = window.matchMedia("(max-width: 720px)").matches;
  const ua = (navigator.userAgent || "").toLowerCase();
  const isAndroid = ua.includes("android");
  const isIOS = /iphone|ipad|ipod/.test(ua);

  const focusedEl = document.activeElement;
  const inputFocused = !!focusedEl && (focusedEl === messageInput || focusedEl === topicSearchInput || focusedEl === searchInput);
  const keyboardThreshold = Math.max(90, Math.round(layoutHeight * 0.14));
  const keyboardOpen = isMobile && (occludedBottom > keyboardThreshold || (inputFocused && occludedBottom > 24));

  const keyboardLift = keyboardOpen ? occludedBottom : 0;
  const navGuardBase = isMobile ? (isAndroid ? 10 : (isIOS ? 8 : 10)) : 0;
  const navGuard = keyboardOpen ? 0 : navGuardBase;
  const stableHeight = vv ? Math.max(layoutHeight, visualHeight + visualTop) : layoutHeight;

  document.documentElement.style.setProperty("--app-height", `${stableHeight}px`);
  document.documentElement.style.setProperty("--mobile-bottom-offset", `${occludedBottom}px`);
  document.documentElement.style.setProperty("--mobile-nav-guard", `${navGuard}px`);
  document.documentElement.style.setProperty("--keyboard-lift", `${keyboardLift}px`);
}
function syncChatScrollbarBounds() {
  if (!chatScrollbar) return;
  const headerEl = document.querySelector(".header");
  const composerEl = document.querySelector(".composer-wrap");
  const headerBottom = headerEl ? headerEl.getBoundingClientRect().bottom : 112;
  const composerTop = composerEl ? composerEl.getBoundingClientRect().top : (window.innerHeight - 122);
  const top = Math.max(86, Math.round(headerBottom));
  const bottom = Math.max(92, Math.round(window.innerHeight - composerTop));
  chatScrollbar.style.setProperty("--chat-scroll-top", `${top}px`);
  chatScrollbar.style.setProperty("--chat-scroll-bottom", `${bottom}px`);
}
function syncChatScrollbarThumb() {
  if (!chatScrollThumb || !chatBox) return;
  const maxScroll = Math.max(0, chatBox.scrollHeight - chatBox.clientHeight);
  const track = chatScrollThumb.parentElement;
  if (!track) return;
  const thumbH = 19;
  const trackH = Math.max(thumbH, track.clientHeight);
  const p = maxScroll > 0 ? (chatBox.scrollTop / maxScroll) : 0;
  const y = Math.round((trackH - thumbH) * p);
  chatScrollThumb.style.transform = `translateY(${y}px)`;
  chatScrollThumb.style.opacity = maxScroll > 0 ? ".9" : ".35";
}
function isChatNearBottom(gap = 34) {
  const remain = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
  return remain <= gap;
}
function setChatNewIndicator(visible) {
  if (!chatNewIndicator) return;
  chatNewIndicator.classList.toggle("show", !!visible);
}
function syncAutoScrollStateFromViewport() {
  const near = isChatNearBottom();
  scrollState.userAtBottom = near;
  scrollState.autoFollow = near;
  if (near) {
    scrollState.unseenCount = 0;
    setChatNewIndicator(false);
  }
}
function scrollBottom(force = false) {
  if (!force && !scrollState.autoFollow) return;
  chatBox.scrollTop = chatBox.scrollHeight;
  syncChatScrollbarThumb();
  syncAutoScrollStateFromViewport();
}
function notifyIncomingWhileReading() {
  if (scrollState.autoFollow) return;
  scrollState.unseenCount += 1;
  setChatNewIndicator(true);
}
function recordTypingSignal(e) {
  const now = Date.now();
  if (!typingSignals.startedAt) typingSignals.startedAt = now;
  if (typingSignals.lastKeyAt > 0) {
    const pause = now - typingSignals.lastKeyAt;
    if (pause >= 120 && pause <= 7000) typingSignals.pauses.push(pause);
  }
  typingSignals.lastKeyAt = now;
  if (e && e.key && e.key.length === 1) typingSignals.keyCount += 1;
  if (e && e.key === "Backspace") typingSignals.backspaceCount += 1;
}
function resetTypingSignals() {
  typingSignals.startedAt = 0;
  typingSignals.keyCount = 0;
  typingSignals.backspaceCount = 0;
  typingSignals.pauses = [];
  typingSignals.lastKeyAt = 0;
}
function collectClientSignals() {
  const now = Date.now();
  const elapsedMin = typingSignals.startedAt ? Math.max(0.01, (now - typingSignals.startedAt) / 60000) : 0;
  const avgPause = typingSignals.pauses.length
    ? Math.round(typingSignals.pauses.reduce((a, b) => a + b, 0) / typingSignals.pauses.length)
    : 0;
  const charsPerMin = elapsedMin > 0 ? Math.round(typingSignals.keyCount / elapsedMin) : 0;
  const backspaceRatio = typingSignals.keyCount > 0
    ? Number((typingSignals.backspaceCount / typingSignals.keyCount).toFixed(3))
    : 0;
  return {
    typing: {
      chars_per_min: charsPerMin,
      avg_pause_ms: avgPause,
      backspace_ratio: backspaceRatio
    },
    voice: {
      energy: Number((lastVoiceEnergy || 0).toFixed(3)),
      speech_rate_wpm: Number((lastSpeechRateWpm || 0).toFixed(1))
    }
  };
}

function loadHistory() {

    if (!raw.conversations) raw.conversations = [];
    const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
    raw.conversations = raw.conversations.filter(c => new Date(c.updatedAt || c.createdAt || Date.now()).getTime() >= cutoff);
    return raw;
  } catch (_) {
    return { conversations: [], activeId: null };
  }
}

function renderTopicList() {
  const targets = [topicListRail].filter(Boolean);
  const q = (topicSearchInput?.value || "").trim().toLowerCase();
  targets.forEach(t => { t.innerHTML = ""; });

  const rows = userHistory.conversations
    .slice()
    .filter(c => (c.mode || "").toLowerCase() !== "luxeph")
    .sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0))
    .filter(c => {
      if (!q) return true;
      const title = (c.title || "").toLowerCase();
      const mode = (c.mode || "").toLowerCase();
      return title.includes(q) || mode.includes(q);
    })
    .slice(0, 80);

  const sections = [];
  const map = {};
  rows.forEach(c => {
    const ts = new Date(c.updatedAt || c.createdAt || Date.now()).getTime();
    const key = topicBucketLabel(ts, currentLang === "tr" ? "tr" : "en");
    if (!map[key]) {
      map[key] = [];
      sections.push(key);
    }
    map[key].push(c);
  });

  targets.forEach(target => {
    if (!rows.length) {
      const empty = document.createElement("div");
      empty.className = "topic-meta";
      empty.style.padding = "8px 6px";
      empty.innerText = currentLang === "tr" ? "Sonuç bulunamadı." : "No result found.";
      target.appendChild(empty);
      return;
    }
    sections.forEach(sec => {
      const h = document.createElement("div");
      h.className = "topic-section-title";
      h.innerText = sec;
      target.appendChild(h);

      map[sec].forEach(c => {
        const item = document.createElement("div");
        item.className = "topic-item" + (c.id === activeConversationId ? " active" : "");
        const modeLabel = (c.mode || "luxviai").toUpperCase();
        const topicLabel = c.title || "Konuşma";

        item.onclick = () => loadConversation(c.id);
        target.appendChild(item);

    });
  });
  syncTopicScrollbarBounds();
  syncTopicScrollbarThumb();
}

async function buildDynamicLanguagePack(lang) {
  if (dynamicLanguageCache[lang]) return dynamicLanguageCache[lang];
  const target = deeplTargetCode(lang);
  const baseDict = textMap.tr;
  const baseUi = uiLocale.tr;
  const tr = async (s) => {
    try {
      const out = await translateText(s, target);
      return out && String(out).trim() ? out : s;
    } catch (_) {
      return s;
    }
  };

  const [
    tagline, placeholder, greetMorning, greetDay, greetEvening, greetNight,
    drawerTitle, drawerSub, insightDefault, insightTitle, searchPlaceholder, searchTitle, searchMatches,
    fark, summary, memory, notes, modes, sound, language,
    female, male, podcast, night, soundOn, soundOff, luxchingPrompt, luxdreamPrompt, luxdreamGreeting,
    noData, noSummary, noMemory, noNotes, notesSelectAll, notesDelete, notesSaved,
    awarenessEmotion, awarenessTheme, awarenessGrowth, awarenessOpenThemes, memoryThemes, memorySymbols, memoryRecords
  ] = await Promise.all([
    tr(baseDict.tagline), tr(baseDict.placeholder), tr(baseDict.greetMorning), tr(baseDict.greetDay), tr(baseDict.greetEvening), tr(baseDict.greetNight),
    tr(baseUi.drawerTitle), tr(baseUi.drawerSub), tr(baseUi.insightDefault), tr(baseUi.insightTitle), tr(baseUi.searchPlaceholder), tr(baseUi.searchTitle), tr(baseUi.searchMatches),
    tr(baseUi.fark), tr(baseUi.summary), tr(baseUi.memory), tr(baseUi.notes), tr(baseUi.modes), tr(baseUi.sound), tr(baseUi.language),
    tr(baseUi.female), tr(baseUi.male), tr(baseUi.podcast), tr(baseUi.night), tr(baseUi.soundOn), tr(baseUi.soundOff),
    tr(baseUi.luxchingPrompt), tr(baseUi.luxdreamPrompt), tr(baseUi.luxdreamGreeting),
    tr(baseUi.noData), tr(baseUi.noSummary), tr(baseUi.noMemory), tr(baseUi.noNotes), tr(baseUi.notesSelectAll), tr(baseUi.notesDelete), tr(baseUi.notesSaved),
    tr(baseUi.awarenessEmotion), tr(baseUi.awarenessTheme), tr(baseUi.awarenessGrowth), tr(baseUi.awarenessOpenThemes),
    tr(baseUi.memoryThemes), tr(baseUi.memorySymbols), tr(baseUi.memoryRecords)
  ]);

  const pack = {
    dict: { tagline, placeholder, greetMorning, greetDay, greetEvening, greetNight },
    ui: {
      drawerTitle, drawerSub, insightDefault, insightTitle, searchPlaceholder, searchTitle, searchMatches,
      fark, summary, memory, notes, modes, sound, language,
      female, male, podcast, night, soundOn, soundOff, luxchingPrompt, luxdreamPrompt, luxdreamGreeting,
      noData, noSummary, noMemory, noNotes, notesSelectAll, notesDelete, notesSaved,
      awarenessEmotion, awarenessTheme, awarenessGrowth, awarenessOpenThemes, memoryThemes, memorySymbols, memoryRecords
    }
  };
  dynamicLanguageCache[lang] = pack;
  return pack;
}

async function localizeSoundItems(lang) {
  if (soundLocaleCache[lang]) {
    localizedSoundItems = soundLocaleCache[lang];
    return localizedSoundItems;
  }
  if (lang === "tr") {
    localizedSoundItems = [...soundItems];
    soundLocaleCache[lang] = localizedSoundItems;
    return localizedSoundItems;
  }
  const target = deeplTargetCode(lang);
  const tr = async (s) => {
    try {
      const out = await translateText(s, target);
      return out && String(out).trim() ? out : s;
    } catch (_) {
      return s;
    }
  };
  const labelMap = soundLabelMap[(lang || "").toLowerCase()] || {};
  const fallbackMap = soundLabelMap.en || {};
  const items = await Promise.all(soundItems.map(async ([key, label, info, kind, freq]) => {
    const [l, i] = await Promise.all([tr(label), tr(info)]);
    const bestLabel = labelMap[key] || ((l && l !== label) ? l : (fallbackMap[key] || label));
    return [key, bestLabel, i || info, kind, freq];
  }));
  soundLocaleCache[lang] = items;
  localizedSoundItems = items;
  return items;
}

async function applyLanguage(lang) {
  const seq = ++languageApplySeq;
  currentLang = lang;
  localStorage.setItem("lux_lang", currentLang);
  setLanguageSelectors(currentLang);

  let dict = textMap[currentLang];
  let ui = uiLocale[currentLang];
  if (!dict || !ui) {
    const pack = await buildDynamicLanguagePack(currentLang);
    if (seq !== languageApplySeq) return;
    const untranslated = pack &&
      pack.ui &&
      pack.dict &&
      pack.ui.fark === uiLocale.tr.fark &&
      pack.ui.summary === uiLocale.tr.summary &&
      pack.dict.greetDay === textMap.tr.greetDay;
    if (untranslated) {
      dict = textMap.en;
      ui = uiLocale.en;
    } else {
      dict = pack.dict;
      ui = pack.ui;
    }
  }
  activeDict = dict;
  activeUi = ui;
  await localizeSoundItems(currentLang);
  if (seq !== languageApplySeq) return;

  document.getElementById("tagline").innerText = "Light your way!";
  searchInput.placeholder = ui.searchPlaceholder;

  farkBtn.innerText = ui.fark;

  notesBtn.innerText = ui.notes;
  const menuTitles = document.querySelectorAll(".menu-title");
  if (menuTitles[0]) menuTitles[0].innerText = ui.modes;
  if (menuTitles[1]) menuTitles[1].innerText = ui.sound;
  if (menuTitles[2]) menuTitles[2].innerText = ui.language;
  const genderButtons = document.querySelectorAll("[data-voice-gender]");

  refreshModeIntro(dict, ui);
}

function ensureAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function stopSound() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (oscillator) { try { oscillator.stop(); } catch (_) {} oscillator = null; }
  if (gainNode) { try { gainNode.disconnect(); } catch (_) {} gainNode = null; }
}
function setVolume(value) {
  if (currentAudio) currentAudio.volume = value;

}
function selectSound(key) {
  if (!soundEnabled) return;

  document.querySelectorAll(".sound-item").forEach(x => x.classList.toggle("selected", x.dataset.sound === key));
  stopSound();
  const found = soundItems.find(x => x[0] === key);
  if (!found) return;
  const [, , , kind, freq] = found;
  const volume = Number(document.getElementById("volumeSlider")?.value || 30) / 100;
  if (kind === "natural") {
    currentAudio = new Audio(`/static/audio/${key}.mp3`);
    currentAudio.loop = true;
    currentAudio.volume = volume;
    currentAudio.play().catch(() => {});
    return;
  }
  const ctx = ensureAudioContext();
  oscillator = ctx.createOscillator();
  gainNode = ctx.createGain();
  oscillator.type = "sine";
  oscillator.frequency.value = key === "binaural" ? 220 + Number(freq || 7) : Number(freq || 10);
  gainNode.gain.value = volume * 0.08;
  oscillator.connect(gainNode);
  gainNode.connect(ctx.destination);
  oscillator.start();
}

function ensureSocket() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
  ws.onopen = () => { wsReady = true; };
  ws.onerror = () => { wsReady = false; };
  ws.onclose = () => {
    wsReady = false;
    ws = null;
    if (wsPending && typeof wsPending.reject === "function") {
      wsPending.reject(new Error("socket_closed"));
      wsPending = null;
    }
    setTimeout(() => ensureSocket(), 900);
  };
  ws.onmessage = evt => {
    if (!wsPending || typeof wsPending.onMessage !== "function") return;
    let data = null;
    try { data = JSON.parse(evt.data || "{}"); } catch (_) { return; }
    wsPending.onMessage(data);
  };
}

function createPacedWriter(targetEl, speedFactor = 0.9) {
  const queue = [];
  const baseDelay = 50;
  const delay = Math.max(22, Math.round(baseDelay / Math.max(0.2, speedFactor)));
  let timer = null;
  let current = "";
  let stopped = false;
  let idleResolvers = [];

  const resolveIdle = () => {
    const pending = idleResolvers.slice();
    idleResolvers = [];
    pending.forEach(r => { try { r(); } catch (_) {} });
  };

  const pump = () => {
    if (stopped) {
      timer = null;
      resolveIdle();
      return;
    }
    if (!queue.length) {
      timer = null;
      resolveIdle();
      return;
    }
    current += queue.shift();
    targetEl.innerText = current;
    if (scrollState.autoFollow) scrollBottom();
    else notifyIncomingWhileReading();
    timer = setTimeout(pump, delay);
  };

  return {
    push(chunk) {
      if (stopped || !chunk) return;
      for (const ch of chunk) queue.push(ch);
      if (!timer) pump();
    },
    setExact(text) {
      if (stopped) return;
      queue.length = 0;
      current = text || "";
      targetEl.innerText = current;
      if (scrollState.autoFollow) scrollBottom();
      else notifyIncomingWhileReading();
      if (!timer) resolveIdle();
    },
    waitIdle() {
      if (!timer && !queue.length) return Promise.resolve();
      return new Promise(resolve => idleResolvers.push(resolve));
    },
    stop() {
      stopped = true;
      queue.length = 0;
      if (timer) {
        clearTimeout(timer);
        timer = null;
      }
      resolveIdle();
    }
  };
}

async function continueInterruptedResponse(targetAiEl) {
  const state = interruptedState;
  if (!state || !targetAiEl) return;
  const continueRunId = ++responseRunId;
  const conversationId = state.conversationId || activeConversationId || getActiveConversation().id;
  if (currentMode !== state.mode) currentMode = state.mode;
  const bridgeMessage = `${continuePromptText()}\n\nKullanıcı mesajı: ${state.userText}\nKaldığın metin: ${state.partialText}`;
  stopStreamRequested = false;
  setResponseLock(true);
  const writer = createPacedWriter(targetAiEl, 0.9);
  writer.setExact(state.partialText || targetAiEl.innerText || "");
  activeGeneration = { runId: continueRunId, conversationId, messageEl: targetAiEl, writer, kind: "continue" };
  const payload = {
    message: bridgeMessage,
    user_id: userId,
    mode: currentMode,
    ghost_hesitation: false,
    location: hiddenLocationLabel || "Konum paylaşılmadı",
    client_signals: collectClientSignals()
  };
  try {
    let responseText = "";
    try {
      responseText = await sendMessageViaSocket(payload, chunk => writer.push(chunk));
      await writer.waitIdle();
    } catch (_) {
      responseText = await sendMessageViaHttp(payload);
      writer.push(responseText);
      await writer.waitIdle();
    }
    if (responseRunId !== continueRunId) return;
    addMessageToHistoryForConversation(conversationId, "assistant", targetAiEl.innerText || responseText);
    clearInterruptedState(true);
    resetTypingSignals();
  } catch (_) {
    // no-op
  } finally {
    if (activeGeneration && activeGeneration.runId === continueRunId) activeGeneration = null;
    setResponseLock(false);
  }
}

function sendMessageViaSocket(payload, onChunk) {
  return new Promise((resolve, reject) => {
    if (wsPending) {
      reject(new Error("socket_busy"));
      return;
    }
    ensureSocket();
    let attempts = 0;
    const waitForOpen = () => {
      attempts += 1;
      if (ws && ws.readyState === WebSocket.OPEN) {
        let streamed = "";
        wsPending = {
          onMessage(data) {
            if (data.type === "chunk") {
              const chunk = data.text || "";
              if (chunk) {
                streamed += chunk;
                if (typeof onChunk === "function") onChunk(chunk);
              }
              return;
            }
            if (data.type === "done") {
              const finalText = (data.response || streamed || heardFallback()).trim();
              wsPending = null;
              resolve(finalText);
            }
          },
          reject(err) {
            wsPending = null;
            reject(err);
          }
        };
        ws.send(JSON.stringify(payload));
        return;
      }
      if (attempts > 40) {
        reject(new Error("socket_not_ready"));
        return;
      }
      setTimeout(waitForOpen, 80);
    };
    waitForOpen();
  });
}

async function sendMessageViaHttp(payload) {

    method: "POST",
    headers: { "Content-Type": "application/json" },

}

async function sendMessageLive(customText) {
  if (aiResponding) return;
  const text = (customText || messageInput.value).trim();
  if (!text) return;
  const runId = ++responseRunId;

  stopStreamRequested = false;
  setResponseLock(true);
  clearInterruptedState(true);
  appendMessage("user", text);
  messageInput.value = "";
  triggerDreamLight();
  const conversationId = activeConversationId || getActiveConversation().id;

  const aiDiv = appendMessage("ai", "", false);
  activeAiDiv = aiDiv;
  const writer = createPacedWriter(aiDiv, 0.9);
  activeGeneration = { runId, conversationId, messageEl: aiDiv, writer, kind: "response" };
  const payload = {
    message: text,
    user_id: userId,
    mode: currentMode,
    ghost_hesitation: false,
    location: hiddenLocationLabel || "Konum paylaşılmadı",
    client_signals: collectClientSignals()
  };

  try {
    streamAbort = () => {
      writer.stop();
      if (wsPending && typeof wsPending.reject === "function") {
        wsPending.reject(new Error("stopped_by_user"));
      }
      wsPending = null;
      if (!aiDiv.innerText.trim()) aiDiv.innerText = stoppedFallback();
      interruptedState = {
        conversationId,
        mode: currentMode,
        userText: text,
        partialText: aiDiv.innerText || ""
      };
      addMessageToHistoryForConversation(conversationId, "assistant", aiDiv.innerText);
      appendResumeButton(aiDiv);
      activeAiDiv = null;
    };

    let responseText = "";
    try {
      responseText = await sendMessageViaSocket(payload, chunk => writer.push(chunk));
      await writer.waitIdle();
    } catch (socketErr) {
      if (stopStreamRequested) return;
      responseText = await sendMessageViaHttp(payload);
      writer.push(responseText);
      await writer.waitIdle();
    }
    if (stopStreamRequested) return;
    if (responseRunId !== runId) return;
    if (!aiDiv.innerText.trim()) writer.setExact(responseText || heardFallback());
    if (currentLang !== "tr" && aiDiv.innerText.trim()) {
      const translated = await translateText(aiDiv.innerText, deeplTargetCode(currentLang));
      if (translated && translated.trim()) writer.setExact(translated);
    }
    addMessageToHistoryForConversation(conversationId, "assistant", aiDiv.innerText);
    resetTypingSignals();
  } catch (_) {
    if (!stopStreamRequested) {
      aiDiv.innerText = connectionFallback();
      addMessageToHistoryForConversation(conversationId, "assistant", aiDiv.innerText);
    }
  } finally {
    streamAbort = null;
    activeAiDiv = null;
    if (activeGeneration && activeGeneration.runId === runId) activeGeneration = null;
    setResponseLock(false);
  }
}

function drawEqualizer() {
  const w = eqCanvas.width;
  const h = eqCanvas.height;
  const bars = 56;
  const data = new Uint8Array(analyser ? analyser.frequencyBinCount : bars);

    const now = performance.now();
    if ((now - lastTs) < 42) {
      if (recording) eqAnimation = requestAnimationFrame(draw);
      return;
    }
    lastTs = now;
    eqCtx.clearRect(0, 0, w, h);
    if (analyser) analyser.getByteFrequencyData(data);
    let energySum = 0;
    for (let i = 0; i < bars; i++) {
      const srcIdx = analyser ? Math.min(data.length - 1, Math.floor(i * (data.length / bars))) : i;
      const raw = analyser
        ? data[srcIdx]
        : (56 + ((Math.sin((now / 620) + (i * 0.45)) + 1) * 0.5 * 150));
      smooth[i] = (smooth[i] * 0.8) + (raw * 0.2);
      const value = smooth[i];
      energySum += value;
      const bh = Math.max(4, (value / 255) * (h * 0.92));
      const x = Math.floor(i * (w / bars));
      const bw = Math.max(4, Math.floor(w / bars) - 3);
      eqCtx.fillStyle = i % 3 === 0 ? "#ED9107" : i % 3 === 1 ? "#F5D68A" : "#B85C5A";
      eqCtx.fillRect(x, h - bh, bw, bh);
    }
    lastVoiceEnergy = bars > 0 ? Math.max(0, Math.min(1, (energySum / bars) / 255)) : 0;
    if (recording) eqAnimation = requestAnimationFrame(draw);
  }
  draw();
}

function compactLocationLabel(raw) {
  const r = raw || {};
  const parts = [r.country, r.admin1, r.admin2, r.name]
    .map(x => String(x || "").trim())
    .filter(Boolean);
  const uniq = [];
  const seen = new Set();
  for (const p of parts) {
    const key = p.toLowerCase();
    if (seen.has(key)) continue;
    seen.add(key);
    uniq.push(p);
  }
  if (!uniq.length) return null;
  return uniq.slice(0, 4).join(" ");
}

async function resolveHiddenLocation() {
  if (!navigator.geolocation) {

  return new Promise(resolve => {
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude, longitude } = pos.coords;
        const rev = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${latitude}&longitude=${longitude}&count=1&language=${currentLang}`);
        const revJson = await rev.json();
        const loc = compactLocationLabel(revJson?.results?.[0]) || `Enlem ${latitude.toFixed(3)}, Boylam ${longitude.toFixed(3)}`;
        hiddenLocationLabel = loc;
        resolve(hiddenLocationLabel);
      } catch (_) {
        hiddenLocationLabel = null;
        resolve(hiddenLocationLabel);
      }
    }, () => {
      hiddenLocationLabel = null;
      resolve(hiddenLocationLabel);
    }, { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 });
  });
}

function pickGreetingPrefix(dictArg = null) {
  const h = new Date().getHours();
  const d = dictArg || getCurrentDict();
  let base = h < 11 ? d.greetMorning : (h < 18 ? d.greetDay : (h < 23 ? d.greetEvening : d.greetNight));
  const lang = (currentLang || "tr").toLowerCase();
  if (lang === "tr") {
    if (h < 11) base = "Günaydın";
    else if (h < 18) base = "İyi günler";
    else if (h < 23) base = "İyi akşamlar";
    else base = "İyi geceler";
    let pick = (Math.random() < 0.22) ? "Merhaba" : base;
    if (pick === lastGreetingText && pick !== "Merhaba") pick = "Merhaba";
    if (pick === lastGreetingText && pick === "Merhaba") pick = base;
    lastGreetingText = pick;
    return pick;
  }
  const candidates = [base, d.greetDay, "Hello"]
    .map(x => String(x || "").trim())
    .filter(Boolean)
    .filter((x, i, arr) => arr.indexOf(x) === i);
  let pick = candidates[Math.floor(Math.random() * candidates.length)] || base || "Hello";
  if (pick === lastGreetingText && candidates.length > 1) {
    pick = candidates.find(x => x !== lastGreetingText) || pick;
  }
  lastGreetingText = pick;
  return pick;
}

  drawCardFrame(ctx, canvas.width, canvas.height);
  loadEditorCanvas(canvas);
  resetEditorStickers();
  setEditorMode("pen");
  shareOverlay.classList.add("active");
}

function drawCardFrame(ctx, width, height) {
  const pad = Math.max(16, Math.round(Math.min(width, height) * 0.024));
  const lw = 3;
  ctx.save();
  ctx.strokeStyle = "#ED9107";
  ctx.lineWidth = lw;
  ctx.strokeRect(pad, pad, width - (pad * 2), height - (pad * 2));
  ctx.restore();
}

function wrapTextForCanvas(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxWidth) {
      if (line) lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

async function openEditorFromScreenshot() {
  if (currentMode === "luxeph") return;
  try {
    const shot = await html2canvas(document.querySelector(".app"), {
      backgroundColor: "#000",
      scale: Math.min(window.devicePixelRatio || 1, 2),
      useCORS: true
    });
    loadEditorCanvas(shot);
    shareOverlay.classList.add("active");
  } catch (_) {
    showPopup("Paylasim", "Ekran goruntusu alinamadi.");
  }
}

function loadEditorCanvas(sourceCanvas) {
  editorCanvas.width = sourceCanvas.width;
  editorCanvas.height = sourceCanvas.height;
  editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
  editorCtx.drawImage(sourceCanvas, 0, 0);
  resetEditorStickers();
  syncEditorStickerLayer();
  editorHistory = [{ url: editorCanvas.toDataURL("image/png"), w: editorCanvas.width, h: editorCanvas.height, stickers: [] }];
}
function pushEditorHistory() {
  editorHistory.push({
    url: editorCanvas.toDataURL("image/png"),
    w: editorCanvas.width,
    h: editorCanvas.height,
    stickers: editorTextStickers.map(item => ({ ...item }))
  });
  editorHistory = editorHistory.slice(-25);
}
function restoreFromDataUrl(entryOrUrl) {
  const entry = typeof entryOrUrl === "string"
    ? { url: entryOrUrl, w: editorCanvas.width, h: editorCanvas.height }
    : entryOrUrl;
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      editorCanvas.width = entry.w || img.width;
      editorCanvas.height = entry.h || img.height;
      editorCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
      editorCtx.drawImage(img, 0, 0, editorCanvas.width, editorCanvas.height);
      editorTextStickers = (entry.stickers || []).map(item => ({ ...item }));
      syncEditorStickerLayer();
      renderEditorStickers();
      resolve();
    };
    img.src = entry.url;
  });
}

function syncEditorStickerLayer() {
  if (!editorStickerLayer) return;
  editorStickerLayer.style.left = `${editorCanvas.offsetLeft}px`;
  editorStickerLayer.style.top = `${editorCanvas.offsetTop}px`;
  editorStickerLayer.style.width = `${editorCanvas.clientWidth}px`;
  editorStickerLayer.style.height = `${editorCanvas.clientHeight}px`;
}

function resetEditorStickers() {
  editorTextStickers = [];
  stickerDrag = null;
  if (editorStickerLayer) editorStickerLayer.innerHTML = "";
}

function renderEditorStickers() {
  if (!editorStickerLayer) return;
  editorStickerLayer.innerHTML = "";
  editorTextStickers.forEach(item => {
    const node = document.createElement("div");
    node.className = "editor-sticker";
    node.dataset.id = item.id;
    node.dataset.x = String(item.x);
    node.dataset.y = String(item.y);
    node.dataset.size = String(item.size);
    node.style.left = `${item.x}px`;
    node.style.top = `${item.y}px`;
    node.style.fontSize = `${item.size}px`;
    node.style.color = item.color;
    node.innerText = item.text;
    editorStickerLayer.appendChild(node);
  });
}

function addEditorSticker(text) {
  if (!editorStickerLayer) return;
  syncEditorStickerLayer();
  const wrapW = editorStickerLayer.clientWidth || 600;
  const wrapH = editorStickerLayer.clientHeight || 420;
  const size = Math.max(16, Math.min(34, shareLineSize * 8));
  const id = `st_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
  const item = {
    id,
    text,
    x: Math.max(14, Math.round(wrapW * 0.16)),
    y: Math.max(14, Math.round(wrapH * 0.28)),
    size,
    color: shareDrawColor,
  };
  editorTextStickers.push(item);
  renderEditorStickers();
}

function commitEditorStickers() {
  if (!editorTextStickers.length) return;
  const sx = editorCanvas.clientWidth > 0 ? (editorCanvas.width / editorCanvas.clientWidth) : 1;
  const sy = editorCanvas.clientHeight > 0 ? (editorCanvas.height / editorCanvas.clientHeight) : 1;
  editorTextStickers.forEach(item => {
    editorCtx.save();
    editorCtx.fillStyle = item.color || "#E8E5DF";
    editorCtx.font = `${Math.max(14, Math.round(item.size * sy))}px Inter`;
    editorCtx.textBaseline = "top";
    editorCtx.fillText(item.text, item.x * sx, item.y * sy);
    editorCtx.restore();
  });
  resetEditorStickers();
}

editorCanvas.addEventListener("mousedown", e => {
  const p = getCanvasPos(e);
  if (shareEditorMode === "crop") {
    isCropping = true;
    cropStart = p;
    return;
  }
  if (shareEditorMode === "text") {
    if (editorTextCapsule) editorTextCapsule.classList.add("open");
    if (editorTextInput) {
      editorTextInput.value = "";
      editorTextInput.focus();
    }
    return;
  }
  if (shareEditorMode === "pen") {
    isDrawing = true;
    editorCtx.strokeStyle = shareDrawColor;
    editorCtx.lineWidth = shareLineSize;
    editorCtx.lineCap = "round";
    editorCtx.beginPath();
    editorCtx.moveTo(p.x, p.y);
  }
});
editorCanvas.addEventListener("mousemove", e => {
  const p = getCanvasPos(e);
  if (isDrawing) {
    editorCtx.lineTo(p.x, p.y);
    editorCtx.stroke();
  }
  if (isCropping && cropStart) {
    previewCropRect(cropStart, p);
  }
});
editorCanvas.addEventListener("mouseup", async e => {
  const p = getCanvasPos(e);
  if (isDrawing) {
    isDrawing = false;
    pushEditorHistory();
  }
  if (isCropping && cropStart) {
    await applyCrop(cropStart, p);
    isCropping = false;
    cropStart = null;
    pushEditorHistory();
  }
});

function getCanvasPos(e) {
  return getCanvasPosFromCoords(e.clientX, e.clientY);
}
function getCanvasPosFromCoords(clientX, clientY) {
  const rect = editorCanvas.getBoundingClientRect();
  const sx = editorCanvas.width / rect.width;
  const sy = editorCanvas.height / rect.height;
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}
function previewCropRect(a, b) {
  if (!editorHistory.length) return;
  const base = editorHistory[editorHistory.length - 1];
  const stickerSnapshot = editorTextStickers.map(item => ({ ...item }));
  restoreFromDataUrl(base).then(() => {
    editorTextStickers = stickerSnapshot;
    renderEditorStickers();
    editorCtx.strokeStyle = "#ED9107";
    editorCtx.lineWidth = 1.5;
    editorCtx.strokeRect(Math.min(a.x, b.x), Math.min(a.y, b.y), Math.abs(a.x - b.x), Math.abs(a.y - b.y));
  });
}
async function applyCrop(a, b) {
  const x = Math.min(a.x, b.x);
  const y = Math.min(a.y, b.y);
  const w = Math.abs(a.x - b.x);
  const h = Math.abs(a.y - b.y);
  if (w < 20 || h < 20) return;
  const tmp = document.createElement("canvas");
  tmp.width = w; tmp.height = h;
  tmp.getContext("2d").drawImage(editorCanvas, x, y, w, h, 0, 0, w, h);
  editorCanvas.width = w;
  editorCanvas.height = h;
  editorCtx.drawImage(tmp, 0, 0);
  editorTextStickers = editorTextStickers
    .map(item => ({ ...item, x: item.x - x, y: item.y - y }))
    .filter(item => {
      const withinX = item.x >= -20 && item.x <= (w + 20);
      const withinY = item.y >= -20 && item.y <= (h + 20);
      return withinX && withinY;
    });
  syncEditorStickerLayer();
  renderEditorStickers();
}

editorCanvas.addEventListener("touchstart", e => {
  if (!e.touches[0]) return;
  e.preventDefault();
  const t = e.touches[0];
  const p = getCanvasPosFromCoords(t.clientX, t.clientY);
  if (shareEditorMode === "crop") {
    isCropping = true;
    cropStart = p;
    return;
  }
  if (shareEditorMode === "text") {
    if (editorTextCapsule) editorTextCapsule.classList.add("open");
    if (editorTextInput) {
      editorTextInput.value = "";
      editorTextInput.focus();
    }
    return;
  }
  if (shareEditorMode === "pen") {
    isDrawing = true;
    editorCtx.strokeStyle = shareDrawColor;
    editorCtx.lineWidth = shareLineSize;
    editorCtx.lineCap = "round";
    editorCtx.beginPath();
    editorCtx.moveTo(p.x, p.y);
  }
}, { passive: false });

editorCanvas.addEventListener("touchmove", e => {
  if (!e.touches[0]) return;
  e.preventDefault();
  const t = e.touches[0];
  const p = getCanvasPosFromCoords(t.clientX, t.clientY);
  if (isDrawing) {
    editorCtx.lineTo(p.x, p.y);
    editorCtx.stroke();
  }
  if (isCropping && cropStart) {
    previewCropRect(cropStart, p);
  }
}, { passive: false });

editorCanvas.addEventListener("touchend", async e => {
  e.preventDefault();
  if (isDrawing) {
    isDrawing = false;
    pushEditorHistory();
  }
  if (isCropping && cropStart) {
    const t = e.changedTouches && e.changedTouches[0];
    if (t) {
      const p = getCanvasPosFromCoords(t.clientX, t.clientY);
      await applyCrop(cropStart, p);
      pushEditorHistory();
    }
    isCropping = false;
    cropStart = null;
  }
}, { passive: false });

function startStickerDrag(clientX, clientY, node) {
  if (!node || !editorStickerLayer) return;
  const id = node.dataset.id;
  const item = editorTextStickers.find(x => x.id === id);
  if (!item) return;
  stickerDrag = {
    id,
    startX: clientX,
    startY: clientY,
    itemX: item.x,
    itemY: item.y,
  };
}

function moveStickerDrag(clientX, clientY) {
  if (!stickerDrag || !editorStickerLayer) return;
  const item = editorTextStickers.find(x => x.id === stickerDrag.id);
  if (!item) return;
  const dx = clientX - stickerDrag.startX;
  const dy = clientY - stickerDrag.startY;
  const maxX = Math.max(8, editorStickerLayer.clientWidth - 24);
  const maxY = Math.max(8, editorStickerLayer.clientHeight - 24);
  item.x = Math.max(8, Math.min(maxX, stickerDrag.itemX + dx));
  item.y = Math.max(8, Math.min(maxY, stickerDrag.itemY + dy));
  renderEditorStickers();
}

function stopStickerDrag() {
  if (!stickerDrag) return;
  stickerDrag = null;
}

if (editorStickerLayer) {
  editorStickerLayer.addEventListener("pointerdown", e => {
    const node = e.target.closest(".editor-sticker");
    if (!node) return;
    e.preventDefault();
    startStickerDrag(e.clientX, e.clientY, node);
  });
}
window.addEventListener("pointermove", e => {
  if (!stickerDrag) return;
  e.preventDefault();
  moveStickerDrag(e.clientX, e.clientY);
}, { passive: false });
window.addEventListener("pointerup", stopStickerDrag);

document.getElementById("toolPen").onclick = () => setEditorMode("text");
document.getElementById("toolCrop").onclick = () => setEditorMode("crop");
document.getElementById("toolText").onclick = () => setEditorMode("pen");
document.getElementById("toolUndo").onclick = async () => {
  if (editorHistory.length <= 1) return;
  editorHistory.pop();
  await restoreFromDataUrl(editorHistory[editorHistory.length - 1]);
};
document.getElementById("toolReset").onclick = async () => {
  if (!editorHistory.length) return;
  await restoreFromDataUrl(editorHistory[0]);
  editorHistory = [editorHistory[0]];
};
document.getElementById("toolClose").onclick = () => {
  commitEditorStickers();
  shareOverlay.classList.remove("active");
};
document.querySelectorAll(".tool-btn[data-color]").forEach(btn => {
  btn.onclick = () => {
    shareDrawColor = btn.dataset.color;
    document.querySelectorAll(".tool-btn[data-color]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
  };
});
document.querySelectorAll(".tool-btn[data-size]").forEach(btn => {
  btn.onclick = () => {
    shareLineSize = Number(btn.dataset.size || 4);
    document.querySelectorAll(".tool-btn[data-size]").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
  };
});

function setEditorMode(mode) {
  shareEditorMode = mode;
  document.getElementById("toolPen").classList.toggle("active", mode === "text");
  document.getElementById("toolCrop").classList.toggle("active", mode === "crop");
  document.getElementById("toolText").classList.toggle("active", mode === "pen");
  if (mode !== "text" && editorTextCapsule) editorTextCapsule.classList.remove("open");
}

function applyEditorText() {
  const t = (editorTextInput?.value || "").trim();
  if (!t) {
    if (editorTextCapsule) editorTextCapsule.classList.remove("open");
    return;
  }
  addEditorSticker(t);
  pushEditorHistory();
  if (editorTextCapsule) editorTextCapsule.classList.remove("open");
}
if (editorTextApply) editorTextApply.onclick = applyEditorText;
if (editorTextInput) {
  editorTextInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      applyEditorText();
    }
  });
}

function stampSignature() {
  const pad = Math.max(16, Math.round(Math.min(editorCanvas.width, editorCanvas.height) * 0.024));
  editorCtx.save();
  editorCtx.font = "16px Inter";
  editorCtx.fillStyle = "#A7A9AC";
  const sig = "LUXVIAI Light your way!";
  const w = editorCtx.measureText(sig).width;
  editorCtx.fillText(sig, editorCanvas.width - w - (pad + 12), editorCanvas.height - (pad + 16));
  editorCtx.restore();
}

async function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}
function openShareUrl(platform, text) {
  const u = {
    whatsapp: `https://wa.me/?text=${encodeURIComponent(text)}`,
    telegram: `https://t.me/share/url?url=&text=${encodeURIComponent(text)}`,
    x: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=&quote=${encodeURIComponent(text)}`,
    instagram: "https://www.instagram.com/",
    tiktok: "https://www.tiktok.com/"
  }[platform];
  if (!u) return;
  const w = window.open(u, "_blank", "noopener");
  if (!w) window.location.href = u;
}
document.querySelectorAll(".share-btn").forEach(btn => {
  btn.onclick = async () => {
    const platform = btn.dataset.share;
    if (!platform) return;
    commitEditorStickers();
    drawCardFrame(editorCtx, editorCanvas.width, editorCanvas.height);
    stampSignature();
    const blob = await canvasToBlob(editorCanvas);
    if (!blob) return;
    const file = new File([blob], "luxviai-card.png", { type: "image/png" });
    const shareText = "";
    if (platform === "download") {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "luxviai-card.png";
      a.click();
      URL.revokeObjectURL(a.href);
      shareOverlay.classList.remove("active");
      return;
    }
    if (platform === "native") {
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], text: shareText, title: "LUXVIAI" });
        } catch (_) {
          openShareUrl("whatsapp", shareText);
        }
      } else {
        openShareUrl("whatsapp", shareText);
      }
      shareOverlay.classList.remove("active");
      return;
    }
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], text: shareText, title: "LUXVIAI" }); } catch (_) { openShareUrl(platform, shareText); }
    } else {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "luxviai-card.png";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1200);
      openShareUrl(platform, shareText);
    }
    shareOverlay.classList.remove("active");
  };
});

["copy", "cut", "paste"].forEach(evt => {
  document.addEventListener(evt, e => {
    if (currentMode === "luxeph") e.preventDefault();
  });
});
document.addEventListener("keydown", e => {
  if (currentMode === "luxeph" && (e.key === "PrintScreen" || ((e.ctrlKey || e.metaKey) && ["c","x","v","s","p"].includes(e.key.toLowerCase())))) {
    e.preventDefault();
    screenShield.classList.add("active");
    setTimeout(() => screenShield.classList.remove("active"), 900);
  }
});

function luxtaSetVisible(visible) {
  luxtaTopState.visible = !!visible;
  document.body.classList.toggle("luxta-top-visible", !!visible);
}
function luxtaClearTimer() {
  if (luxtaTopState.timer) {
    clearTimeout(luxtaTopState.timer);
    luxtaTopState.timer = null;
  }
}
function luxtaScheduleHide(timeoutMs = 3000) {
  luxtaClearTimer();
  if (currentMode !== "luxta") return;
  if (luxtaTopState.locks.size > 0) return;
  luxtaTopState.timer = setTimeout(() => {
    if (currentMode !== "luxta") return;
    if (luxtaTopState.locks.size > 0) return;
    luxtaSetVisible(false);
  }, timeoutMs);
}
function luxtaAcquire(reason) {
  if (currentMode !== "luxta") return;
  luxtaTopState.locks.add(reason);
  luxtaSetVisible(true);
  luxtaClearTimer();
}
function luxtaRelease(reason, timeoutMs = 3000) {
  luxtaTopState.locks.delete(reason);
  luxtaScheduleHide(timeoutMs);
}
function revealLuxtaTop(timeoutMs = 3000) {
  if (currentMode !== "luxta") return;
  luxtaSetVisible(true);
  luxtaScheduleHide(timeoutMs);
}

document.addEventListener("mousemove", e => {
  if (currentMode !== "luxta") return;
  if (e.clientY < 90) revealLuxtaTop(3000);
});
document.addEventListener("touchstart", e => {
  if (currentMode !== "luxta") return;
  const t = e.touches[0];
  if (t && t.clientY < 120) revealLuxtaTop(3000);
}, { passive: true });
document.addEventListener("pointerdown", e => {
  if (currentMode !== "luxta") return;
  if (e.target && (e.target.closest(".header") || e.target.closest(".header-tools") || e.target.closest(".header-tools-left"))) {
    revealLuxtaTop(3000);
  }
}, { passive: true });

async function bootGreeting() {
  const instant = `${pickGreetingPrefix(getCurrentDict())}.`;
  appendMessage("ai", instant || "Merhaba.", false);
}

async function initApp() {
  setAppHeight();
  populateLanguages();
  try {
    await applyLanguage(currentLang);
  } catch (_) {
    activeDict = textMap.tr;
    activeUi = uiLocale.tr;
    localizedSoundItems = [...soundItems];
    buildLuxtaPanel();
  }

  drawGlyphStrip();
  resolveHiddenLocation();

  if (!activeConversationId || !userHistory.conversations.find(c => c.id === activeConversationId)) {
    renderTopicList();
    setEditorMode("pen");
    await bootGreeting();
    refreshTopActionButtons();
    syncTopicScrollbarBounds();
    syncTopicScrollbarThumb();
    syncChatScrollbarBounds();
    syncChatScrollbarThumb();
    return;
  }

  loadConversation(activeConversationId);
  renderTopicList();
  setEditorMode("pen");
  refreshTopActionButtons();
  syncTopicScrollbarBounds();
  syncTopicScrollbarThumb();
  syncChatScrollbarBounds();
  syncChatScrollbarThumb();
}

initApp();
